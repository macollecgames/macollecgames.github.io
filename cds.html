<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDs — Collectioner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.18.6/zxing.min.js" crossorigin="anonymous"></script>
    <script src="gist.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;width:100%}
        body{font-family:'Rajdhani',sans-serif;}
        body.dark-mode{background:linear-gradient(135deg,#0a0e27 0%,#1a0033 50%,#0f0a25 100%);color:#fff}
        body.light-mode{background:linear-gradient(135deg,#f5f5f5 0%,#e8e8e8 50%,#f0f0f0 100%);color:#333}
        .header{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid;position:sticky;top:0;z-index:50;}
        body.dark-mode .header{background:rgba(10,15,40,.97);border-color:#0ff;}
        body.light-mode .header{background:rgba(255,255,255,.97);border-color:#ddd;}
        .back-btn{background:#0099cc;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:700;font-family:'Rajdhani',sans-serif;font-size:.95rem;}
        body.light-mode .back-btn{background:#333;}
        .page-title{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:900;color:#0ff;}
        body.light-mode .page-title{color:#333;}
        .stats-text{font-size:.85rem;color:#0ff;}
        body.light-mode .stats-text{color:#666;}
        .search-zone{padding:14px 20px;display:flex;gap:10px;flex-wrap:wrap;}
        .search-bar{flex:1;min-width:220px;display:flex;align-items:center;border:2px solid #0ff;border-radius:8px;padding:0 12px;overflow:hidden;}
        body.dark-mode .search-bar{background:rgba(10,15,40,.6);}
        body.light-mode .search-bar{background:#fff;border-color:#ddd;}
        .search-bar input{background:transparent;border:none;outline:none;color:inherit;padding:9px 4px;width:100%;font-family:'Rajdhani',sans-serif;font-size:.95rem;}
        .btn-add{background:#00ff88;color:#000;border:none;padding:9px 18px;border-radius:8px;cursor:pointer;font-weight:700;font-family:'Rajdhani',sans-serif;font-size:.95rem;}
        .container{padding:0 20px 20px;max-width:1400px;margin:0 auto;}
        .controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;padding-top:14px;}
        .sort-sel{padding:8px 12px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:.9rem;cursor:pointer;}
        body.dark-mode .sort-sel{background:rgba(10,15,40,.6);border:2px solid #0ff;color:#fff;}
        body.light-mode .sort-sel{background:#fff;border:2px solid #ddd;color:#333;}
        .view-btns{display:flex;gap:6px;}
        .view-btn{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-family:'Rajdhani',sans-serif;font-size:.9rem;}
        body.dark-mode .view-btn{background:#0099cc;color:#fff;}
        body.light-mode .view-btn{background:#333;color:#fff;}
        .view-btn.active{background:#00ff88;color:#000;}
        .stats-panel{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:18px;padding:14px;border-radius:10px;}
        body.dark-mode .stats-panel{background:rgba(0,200,255,.06);border:2px solid rgba(0,200,255,.2);}
        body.light-mode .stats-panel{background:rgba(0,0,0,.04);border:2px solid #e0e0e0;}
        .stat-item{text-align:center;}
        .stat-val{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:700;color:#0ff;}
        body.light-mode .stat-val{color:#333;}
        .stat-lbl{font-size:.78rem;opacity:.55;margin-top:2px;}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:24px 16px;}
        .vinyl-box{cursor:pointer;width:190px;justify-self:center;display:flex;flex-direction:column;gap:8px;}

        /* Tablette */
        @media(max-width:768px){
            .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:18px 12px;}
            .vinyl-box{width:160px;}
            .vinyl-card{width:160px!important;height:160px!important;}
            .vinyl-title{font-size:.67rem;}
        }
        /* Mobile */
        @media(max-width:480px){
            .grid{grid-template-columns:repeat(2,1fr);gap:14px 10px;}
            .vinyl-box{width:100%;}
            .vinyl-card{width:100%!important;height:0!important;padding-bottom:100%;position:relative;}
            .vinyl-cover{position:absolute!important;top:0;left:16px;right:0;bottom:0;}
            .vinyl-spine{position:absolute!important;left:0;top:0;width:16px;height:100%;}
            .vinyl-gloss{position:absolute!important;}
            .vinyl-actions{position:absolute!important;}
            .vinyl-title{font-size:.65rem;}
            .vinyl-artist{font-size:.6rem;}
        }

        /* === Boîtier CD Jewel Case === */
        /* Le boîtier lui-même — carré */
        .vinyl-card{
            width:190px;
            height:190px;
            position:relative;
            flex-shrink:0;
            border-radius:2px 3px 3px 2px;
            overflow:hidden;
            transition:transform .3s ease, box-shadow .3s ease;
            box-shadow:4px 5px 14px rgba(0,0,0,.8);
        }
        body.dark-mode .vinyl-card{ background:#0d0d0d; }
        body.light-mode .vinyl-card{ background:#bbb; }

        .vinyl-box:hover .vinyl-card{
            transform:perspective(600px) rotateY(-10deg) translateX(4px);
            box-shadow:10px 12px 28px rgba(0,0,0,.9);
        }

        /* Tranche noire épaisse à gauche */
        .vinyl-spine{
            position:absolute;left:0;top:0;
            width:16px;height:100%;
            background:linear-gradient(90deg,#000 0%,#1a1a1a 60%,#0d0d0d 100%);
            border-right:1px solid rgba(255,255,255,.08);
            z-index:4;
        }

        /* Zone pochette — à droite de la tranche */
        .vinyl-cover{
            position:absolute;top:0;left:16px;right:0;bottom:0;
        }
        .vinyl-cover-img{
            width:100%;height:100%;
            background-size:contain;
            background-repeat:no-repeat;
            background-position:center;
            display:flex;align-items:center;justify-content:center;
            font-size:2.5rem;
        }
        body.dark-mode .vinyl-cover-img{ background-color:#111; }
        body.light-mode .vinyl-cover-img{ background-color:#ccc; }

        /* Reflet plastique */
        .vinyl-gloss{
            position:absolute;top:0;left:16px;right:0;height:40%;
            background:linear-gradient(180deg,rgba(255,255,255,.14) 0%,transparent 100%);
            pointer-events:none;z-index:5;
        }

        /* Infos en dessous du boîtier */
        .vinyl-info{ padding:0 2px; }
        .vinyl-title{font-size:.7rem;font-weight:700;color:#0ff;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        body.light-mode .vinyl-title{color:#333;}
        .vinyl-artist{font-size:.62rem;color:rgba(255,255,255,.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
        body.light-mode .vinyl-artist{color:#555;}
        .vinyl-year{font-size:.58rem;color:rgba(255,255,255,.35);margin-top:1px;}

        /* Boutons action */
        .vinyl-actions{position:absolute;top:4px;right:4px;display:flex;gap:4px;opacity:0;transition:.25s;z-index:10;}
        .vinyl-box:hover .vinyl-actions{opacity:1;}
        .vinyl-actions button{background:rgba(0,0,0,.8);color:#0ff;border:1px solid rgba(0,255,255,.35);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:.72rem;font-weight:700;}
        .vinyl-actions button:hover{background:#00ff88;color:#000;border-color:#00ff88;}
        .list-view{display:flex;flex-direction:column;gap:10px;}
        .list-item{display:flex;gap:14px;align-items:center;padding:14px;border-radius:8px;}
        body.dark-mode .list-item{background:rgba(10,15,40,.6);border:2px solid rgba(0,200,255,.25);}
        body.light-mode .list-item{background:#fff;border:2px solid #e0e0e0;}
        .list-cover{width:72px;height:72px;border-radius:5px;background-size:cover;background-position:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.8rem;}
        body.dark-mode .list-cover{background-color:#1a0a20;}
        body.light-mode .list-cover{background-color:#e8e8e8;}
        .list-info{flex:1;min-width:0;}
        .list-title{font-size:1rem;font-weight:700;color:#0ff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        body.light-mode .list-title{color:#333;}
        .list-sub{font-size:.85rem;opacity:.7;}
        .list-meta{font-size:.78rem;opacity:.5;margin-top:2px;}
        .list-actions{display:flex;gap:6px;flex-shrink:0;}
        .demo-badge{font-size:.58rem;background:rgba(0,200,255,.12);color:#0ff;border:1px solid rgba(0,200,255,.3);border-radius:3px;padding:1px 5px;margin-left:4px;}
        .loan-badge{font-size:.62rem;background:rgba(255,170,0,.12);color:#fa0;border:1px solid rgba(255,170,0,.3);border-radius:3px;padding:1px 5px;margin-left:4px;}
        .empty-msg{opacity:.4;text-align:center;padding:50px;grid-column:1/-1;font-size:1.1rem;}
        .btn{padding:9px 18px;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-family:'Rajdhani',sans-serif;font-size:.9rem;transition:.2s;}
        .btn:hover{opacity:.85;}
        .btn-primary{background:#00ff88;color:#000;}
        .btn-ghost{border:2px solid rgba(0,200,255,.3);background:transparent;color:#0ff;}
        body.light-mode .btn-ghost{border-color:#ccc;color:#666;}
        .btn-danger{background:rgba(0,200,255,.1);color:#0ff;border:2px solid rgba(0,200,255,.2);}
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
        .modal.active{display:flex;}
        .modal-content{border-radius:10px;padding:22px;max-width:720px;width:100%;margin:auto;position:relative;max-height:90vh;overflow-y:auto;}
        body.dark-mode .modal-content{background:#0d1230;border:2px solid #0ff;}
        body.light-mode .modal-content{background:#fff;border:2px solid #ddd;}
        .modal-title{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;color:#0ff;margin-bottom:16px;}
        body.light-mode .modal-title{color:#333;}
        .close-btn{position:absolute;top:12px;right:12px;background:#0099cc;color:#fff;border:none;padding:5px 11px;border-radius:5px;cursor:pointer;font-weight:700;}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
        @media(max-width:520px){.form-grid{grid-template-columns:1fr;}}
        .form-full{grid-column:1/-1;}
        .form-group{display:flex;flex-direction:column;gap:5px;}
        .lbl{font-size:.83rem;font-weight:600;opacity:.75;}
        .req{color:#0ff;}
        .input,.sel,.txtarea{padding:9px 12px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:.9rem;transition:.3s;width:100%;}
        body.dark-mode .input,body.dark-mode .sel,body.dark-mode .txtarea{background:#0d1a2e;border:2px solid rgba(0,200,255,.2);color:#fff;}
        body.dark-mode .sel option{background:#0d1a2e;color:#fff;}
        body.light-mode .sel option{background:#fff;color:#333;}
        body.light-mode .input,body.light-mode .sel,body.light-mode .txtarea{background:#f8f8f8;border:2px solid #e0e0e0;color:#333;}
        .input:focus,.sel:focus,.txtarea:focus{outline:none;}
        body.dark-mode .input:focus,body.dark-mode .sel:focus,body.dark-mode .txtarea:focus{border-color:#0ff;}
        .txtarea{min-height:70px;resize:vertical;}
        .preview{width:100%;height:280px;border-radius:6px;margin-top:8px;background-size:contain;background-position:center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center;font-size:3rem;}
        body.dark-mode .preview{background-color:rgba(0,200,255,.05);border:2px dashed rgba(0,200,255,.2);}
        body.light-mode .preview{background-color:#f0f0f0;border:2px dashed #ddd;}
        .btn-row{display:flex;gap:10px;margin-top:16px;}
        .err-msg{padding:10px;border-radius:5px;font-size:.85rem;font-weight:700;margin-top:8px;background:rgba(0,200,255,.1);border:2px solid rgba(0,200,255,.3);color:#0ff;}
        .api-zone{padding:14px;border-radius:8px;margin-bottom:16px;}
        body.dark-mode .api-zone{background:rgba(0,200,255,.05);border:2px solid rgba(0,200,255,.2);}
        body.light-mode .api-zone{background:#fff8fc;border:2px solid #f0d0e0;}
        .api-zone-title{font-size:.83rem;font-weight:700;margin-bottom:10px;color:#0ff;display:flex;align-items:center;gap:6px;}
        .api-row{display:flex;gap:8px;}
        .api-input{flex:1;padding:9px 12px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:.9rem;}
        body.dark-mode .api-input{background:rgba(0,0,0,.3);border:2px solid rgba(0,200,255,.2);color:#fff;}
        body.light-mode .api-input{background:#fff;border:2px solid #ddd;color:#333;}
        .api-input:focus{outline:none;border-color:#0ff;}
        .btn-scan-sm{background:#0099cc;color:#fff;border:none;padding:9px 13px;border-radius:6px;cursor:pointer;font-weight:700;font-size:.9rem;}
        .btn-search-sm{background:rgba(0,200,255,.15);color:#0ff;border:2px solid rgba(0,200,255,.3);padding:9px 13px;border-radius:6px;cursor:pointer;font-weight:700;font-family:'Rajdhani',sans-serif;font-size:.9rem;}
        .api-status{font-size:.75rem;opacity:.6;margin-top:6px;display:block;}
        .results-list{margin-top:8px;display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto;}
        .res-item{display:flex;gap:10px;align-items:center;padding:7px 10px;border-radius:6px;cursor:pointer;transition:.2s;}
        body.dark-mode .res-item{background:rgba(255,255,255,.04);border:1px solid rgba(0,200,255,.15);}
        body.light-mode .res-item{background:#f8f8f8;border:1px solid #e0e0e0;}
        .res-item:hover{border-color:#0ff;}
        .res-thumb{width:38px;height:38px;border-radius:4px;background-size:cover;background-position:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
        body.dark-mode .res-thumb{background-color:#1a0a20;}
        body.light-mode .res-thumb{background-color:#e0e0e0;}
        .res-title{font-size:.85rem;font-weight:700;}
        .res-sub{font-size:.72rem;opacity:.5;}
        .scanner-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:18px;}
        .scanner-overlay.active{display:flex;}
        #scanVideo{width:min(330px,90vw);border-radius:10px;border:3px solid #0ff;}
        .scanner-hint{color:rgba(255,255,255,.7);font-size:.9rem;}
        .btn-scanner-close{background:#0099cc;color:#fff;border:none;padding:10px 28px;border-radius:8px;cursor:pointer;font-weight:700;font-family:'Rajdhani',sans-serif;}
        .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#00ff88;color:#000;font-weight:700;font-size:.9rem;padding:11px 24px;border-radius:8px;z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;font-family:'Rajdhani',sans-serif;}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
        .toast.error{background:#0099cc;color:#fff;}
        /* Badge état sur boîtier */
        .state-badge{position:absolute;top:5px;left:20px;z-index:6;padding:2px 6px;border-radius:3px;font-size:.55rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
        .state-neuf{background:#00ff88;color:#000;}
        .state-excellent{background:#0cf;color:#000;}
        .state-bon{background:#0099cc;color:#fff;}
        .state-acceptable{background:#ff8800;color:#fff;}
        .state-use{background:#ff2255;color:#fff;}
        /* Placeholder sans pochette */
        .cover-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;opacity:.5;}
        .cover-placeholder .ph-disc{font-size:2.8rem;filter:drop-shadow(0 0 8px rgba(0,255,255,.4));}
        .cover-placeholder .ph-title{font-size:.6rem;font-family:'Rajdhani',sans-serif;font-weight:700;color:#0ff;text-align:center;padding:0 8px;line-height:1.2;}
        /* Filtres */
        .filters{display:flex;gap:8px;flex-wrap:wrap;padding:0 20px 12px;}
        .filter-sel{padding:7px 10px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:.85rem;cursor:pointer;}
        body.dark-mode .filter-sel{background:rgba(10,15,40,.6);border:2px solid rgba(0,200,255,.25);color:#fff;}
        body.light-mode .filter-sel{background:#fff;border:2px solid #ddd;color:#333;}
        .filter-sel option{background:#0d1230;}
        .btn-export{background:rgba(0,200,255,.12);color:#0ff;border:2px solid rgba(0,200,255,.25);padding:7px 12px;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;transition:.2s;}
        .btn-export:hover{background:rgba(0,200,255,.25);}
        .btn-del-sel{background:rgba(255,34,85,.15);color:#ff2255;border:2px solid rgba(255,34,85,.3);padding:7px 12px;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;display:none;transition:.2s;}
        .btn-del-sel.visible{display:inline-block;}
        /* Sélection multiple */
        .vinyl-box.selected .vinyl-card{outline:3px solid #00ff88;outline-offset:2px;}
        .select-mode-bar{display:none;padding:8px 20px;background:rgba(0,255,136,.08);border-bottom:1px solid rgba(0,255,136,.2);align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
        .select-mode-bar.active{display:flex;}
        .select-mode-bar span{font-size:.85rem;color:#0f8;font-weight:700;}
        /* Pagination */
        .pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:20px 0 10px;flex-wrap:wrap;}
        .pg-btn{padding:7px 13px;border:2px solid rgba(0,200,255,.25);background:transparent;color:#0ff;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;transition:.2s;min-width:38px;}
        .pg-btn:hover{background:rgba(0,200,255,.15);}
        .pg-btn.active{background:#0ff;color:#000;border-color:#0ff;}
        .pg-btn:disabled{opacity:.3;cursor:not-allowed;}
        .pg-info{font-size:.8rem;opacity:.5;padding:0 6px;}
        /* Cover picker */
        .cover-picker{margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;}
        .cover-opt{width:70px;height:70px;border-radius:5px;background-size:cover;background-position:center;cursor:pointer;border:2px solid transparent;transition:.2s;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#aaa;text-align:center;position:relative;}
        .cover-opt:hover{border-color:#0ff;transform:scale(1.06);}
        .cover-opt.selected{border-color:#0f8;box-shadow:0 0 10px rgba(0,255,136,.5);}
        .cover-opt-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);font-size:.55rem;padding:2px;text-align:center;border-radius:0 0 3px 3px;}
        /* Lightbox */
        .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
        .lightbox.active{display:flex;}
        .lightbox-img{max-width:min(500px,90vw);max-height:70vh;border-radius:8px;border:2px solid #0ff;object-fit:contain;}
        .lightbox-tabs{display:flex;gap:10px;}
        .lightbox-tab{padding:8px 20px;border:2px solid rgba(0,200,255,.3);background:transparent;color:#0ff;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.9rem;transition:.2s;}
        .lightbox-tab.active{background:#0ff;color:#000;}
        .lightbox-actions{display:flex;gap:10px;}
        .lightbox-select{background:#00ff88;color:#000;border:none;padding:9px 22px;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.95rem;}
        .lightbox-close{background:rgba(255,255,255,.1);color:#fff;border:none;padding:9px 18px;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.95rem;}
    </style>
</head>
<body class="dark-mode">
    <div class="header">
        <button class="back-btn" onclick="window.location.href='collectioner.html'">← Retour</button>
        <div class="page-title">💿 CDs</div>
        <div class="stats-text" id="statsText">0 CDs</div>
    </div>
    <div class="search-zone">
        <div class="search-bar"><input type="text" id="searchInput" placeholder="Rechercher..." oninput="debouncedFilter()"></div>
        <button class="btn-add" onclick="openAddModal()">+ Ajouter</button>
    </div>
    <div class="select-mode-bar" id="selectBar">
        <span id="selectCount">0 sélectionné(s)</span>
        <div style="display:flex;gap:8px;">
            <button class="btn-del-sel visible" onclick="deleteSelected()">🗑️ Supprimer la sélection</button>
            <button style="background:transparent;border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:5px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;" onclick="exitSelectMode()">✕ Annuler</button>
        </div>
    </div>
    <div class="filters">
        <select id="filterGenre" class="filter-sel" onchange="applyFilters()">
            <option value="">Tous les genres</option>
        </select>
        <select id="filterEtat" class="filter-sel" onchange="applyFilters()">
            <option value="">Tous les états</option>
            <option value="Neuf">Neuf</option>
            <option value="Excellent">Excellent</option>
            <option value="Bon">Bon</option>
            <option value="Acceptable">Acceptable</option>
            <option value="Usé">Usé</option>
        </select>

    <script>
    (function(){ document.body.className = localStorage.getItem('darkMode')!=='false' ? 'dark-mode' : 'light-mode'; })();
    window.addEventListener('storage', e => { if(e.key==='darkMode') location.reload(); });

    const KEY = 'cdCollection';
    const DEMO = [
        {id:'demo-cd1',title:'The Wall',artist:'Pink Floyd',year:'1979',genre:'Rock',label:'Harvest',discCount:'2',size:'CD',color:'Jewel',diskState:'Bon',pochetteState:'Bon',pochettePresent:'Oui',price:30,value:60,edition:'',loanTo:'Marc',notes:'',cover:'https://i.discogs.com/BhpVAq1wR6R8XjfCGcl1VcwBJmjMxKkUkPqBzl6w29g/rs:fit/g:sm/q:90/h:600/w:600/czM6Ly9kaXNjb2dz/LWRhdGFiYXNlLWlt/YWdlcy9SLTIwMTQ3/My0xNTUwMDYzNjEy/LTI0OTguanBlZw.jpeg'},
        {id:'demo-cd2',title:'Born to Run',artist:'Bruce Springsteen',year:'1975',genre:'Rock',label:'Columbia',discCount:'1',size:'CD',color:'Jewel',diskState:'Acceptable',pochetteState:'Acceptable',pochettePresent:'Oui',price:25,value:80,edition:'Pressage original',loanTo:'',notes:'Rayures légères',cover:''}
    ];

    let editingId=null, currentView='grid', filterText='', sortVal='', debTimer;
    let scanStream=null, codeReader=null;
    let currentPage=1; const PAGE_SIZE=20;
    let filterEtat='', filterGenre='', filterPret='';
    let selectMode=false, selectedIds=new Set();
    window._apiResults=[];

    function isDemo(id){ return id && id.startsWith('demo-'); }

    function loadUser(){ try{ return JSON.parse(localStorage.getItem(KEY))||[]; }catch{ return []; } }
    function saveUser(list){
        try{ localStorage.setItem(KEY,JSON.stringify(list)); saveToGist(); }
        catch(e){
            if(e.name==='QuotaExceededError') showToast('⚠ Stockage plein — supprimez des images locales',true);
            else showToast('⚠ Erreur de sauvegarde',true);
        }
    }
    function getAll(){ return [...DEMO,...loadUser()]; }

    function debouncedFilter(){ clearTimeout(debTimer); debTimer=setTimeout(()=>{ filterText=document.getElementById('searchInput').value.toLowerCase().trim(); currentPage=1; render(); },200); }
    function onSort(){ sortVal=document.getElementById('sortSel').value; currentPage=1; render(); }
    function applyFilters(){
        filterEtat=document.getElementById('filterEtat').value;
        filterGenre=document.getElementById('filterGenre').value;
        filterPret=document.getElementById('filterPret').value;
        currentPage=1; render();
    }

    function populateGenreFilter(){
        const genres=[...new Set(getAll().map(i=>i.genre||'').filter(Boolean))].sort();
        const sel=document.getElementById('filterGenre');
        const cur=sel.value;
        sel.innerHTML='<option value="">Tous les genres</option>'+genres.map(g=>`<option value="${g}"${g===cur?' selected':''}>${g}</option>`).join('');
    }

    function getVisible(){
        let items=getAll();
        if(filterText) items=items.filter(it=>
            (it.title||'').toLowerCase().includes(filterText)||
            (it.artist||'').toLowerCase().includes(filterText)||
            (it.genre||'').toLowerCase().includes(filterText)||
            (it.label||'').toLowerCase().includes(filterText)||
            (it.year||'').toString().includes(filterText)
        );
        if(filterEtat) items=items.filter(it=>it.diskState===filterEtat);
        if(filterGenre) items=items.filter(it=>it.genre===filterGenre);
        if(filterPret==='pret') items=items.filter(it=>it.loanTo);
        if(filterPret==='dispo') items=items.filter(it=>!it.loanTo);
        if(sortVal){ items=[...items]; items.sort((a,b)=>{
            if(sortVal==='title-asc') return (a.title||'').localeCompare(b.title||'');
            if(sortVal==='title-desc') return (b.title||'').localeCompare(a.title||'');
            if(sortVal==='artist-asc') return (a.artist||'').localeCompare(b.artist||'');
            if(sortVal==='value-desc') return (b.value||0)-(a.value||0);
            if(sortVal==='year-desc') return (b.year||0)-(a.year||0);
            return 0;
        }); }
        return items;
    }

    function render(){
        const v=getVisible();
        const total=v.length;
        const pages=Math.max(1,Math.ceil(total/PAGE_SIZE));
        if(currentPage>pages) currentPage=pages;
        const paged=v.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
        currentView==='grid'?renderGrid(paged):renderList(paged);
        updateStats(v);
        renderPagination(total, pages);
        populateGenreFilter();
    }

    function renderPagination(total, pages){
        const pg=document.getElementById('pagination');
        if(pages<=1){ pg.innerHTML=''; return; }
        let html='';
        html+=`<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
        for(let i=1;i<=pages;i++){
            if(pages>7 && i>2 && i<pages-1 && Math.abs(i-currentPage)>1){
                if(i===3||i===pages-2) html+=`<span class="pg-info">…</span>`;
                continue;
            }
            html+=`<button class="pg-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
        }
        html+=`<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>`;
        html+=`<span class="pg-info">${total} éléments</span>`;
        pg.innerHTML=html;
    }

    function goPage(p){ currentPage=p; render(); window.scrollTo({top:0,behavior:'smooth'}); }

    // Badge état
    function stateBadge(state){
        if(!state) return '';
        const map={'Neuf':'state-neuf','Excellent':'state-excellent','Bon':'state-bon','Acceptable':'state-acceptable','Usé':'state-use'};
        const cls=map[state]||'';
        return cls?`<div class="state-badge ${cls}">${state}</div>`:'';
    }

    // Sélection multiple
    function toggleSelectMode(){
        selectMode=!selectMode;
        selectedIds.clear();
        document.getElementById('selectBar').classList.toggle('active',selectMode);
        document.getElementById('selectCount').textContent='0 sélectionné(s)';
        render();
    }
    function exitSelectMode(){ selectMode=false; selectedIds.clear(); document.getElementById('selectBar').classList.remove('active'); render(); }
    function toggleSelect(id){
        if(isDemo(id)) return;
        if(selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
        document.getElementById('selectCount').textContent=selectedIds.size+' sélectionné(s)';
        // Update visual only
        document.querySelectorAll('.vinyl-box[data-id]').forEach(el=>{
            el.classList.toggle('selected', selectedIds.has(el.dataset.id));
        });
    }
    function deleteSelected(){
        if(!selectedIds.size) return;
        if(!confirm(`Supprimer ${selectedIds.size} CD(s) ?`)) return;
        saveUser(loadUser().filter(i=>!selectedIds.has(i.id)));
        exitSelectMode();
        showToast('🗑️ '+selectedIds.size+' CD(s) supprimé(s)');
    }

    // Export CSV
    function exportCSV(){
        const items=loadUser();
        if(!items.length){ showToast('⚠ Aucun CD à exporter',true); return; }
        const headers=['Titre','Artiste','Année','Genre','Label','Format','État disque','État pochette','Prix','Valeur','Prêté à','Notes'];
        const rows=items.map(v=>[v.title,v.artist,v.year,v.genre,v.label,v.size,v.diskState,v.pochetteState,v.price,v.value,v.loanTo,v.notes].map(c=>`"${(c||'').toString().replace(/"/g,'""')}"`).join(','));
        const csv=[headers.join(','),...rows].join('\n');
        const a=document.createElement('a');
        a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
        a.download='collection_cds.csv';
        a.click();
        showToast('📥 Export CSV téléchargé !');
    }

    function actionBtns(id,sm){
        const demo=isDemo(id);
        const s=sm?'font-size:.72rem;padding:4px 8px;':'';
        const dis=demo?` disabled style="opacity:.3;cursor:not-allowed;${s}"`:`style="${s}"`;
        const eF=demo?'':` onclick="editItem('${id}')"`;
        const dF=demo?'':` onclick="deleteItem('${id}')"`;
        return `<button class="btn btn-primary"${eF}${dis}>✏️</button><button class="btn btn-danger"${dF}${dis}>🗑️</button>`;
    }

    function renderGrid(items){
        const g=document.getElementById('itemGrid');
        if(!items.length){ g.innerHTML='<p class="empty-msg">💿 Aucun CD trouvé</p>'; return; }
        g.innerHTML=items.map(v=>{
            const disc=v.discCount>1?` (${v.discCount})`:'';
            const badge=isDemo(v.id)?'<span class="demo-badge">démo</span>':'';

            const coverClick=v.cover?`onclick="${selectMode?`toggleSelect('${v.id}')`:`openItemCover('${v.cover}')`}"`:
                                      (selectMode?`onclick="toggleSelect('${v.id}')"`:'');

                </div>
                <div class="vinyl-info">

    const MB_TTL=86400000;
    async function searchMB(q){
        const ckey='mb_cache_'+q.slice(0,50).replace(/\W/g,'_');
        try{ const c=JSON.parse(localStorage.getItem(ckey)||'null'); if(c&&Date.now()-c.ts<MB_TTL) return c.data; }catch{}
        const isBC=/^\d{8,14}$/.test(q.trim());
        const url=isBC
            ?`https://musicbrainz.org/ws/2/release?query=barcode:${q}&limit=5&fmt=json`
            :`https://musicbrainz.org/ws/2/release?query=${encodeURIComponent(q)}&limit=6&fmt=json`;
        const r=await fetch(url,{headers:{'User-Agent':'Collectioner/2.0 ( personal )'}});
        if(!r.ok) throw new Error('MusicBrainz HTTP '+r.status);
        const data=await r.json();
        const results=(data.releases||[]).map(rel=>{
            const artist=(rel['artist-credit']||[]).map(a=>a.artist?.name||a.name||'').filter(Boolean).join(', ');
            return { id:rel.id, title:rel.title, artist, year:(rel.date||'').slice(0,4), genre:(rel.genres||[])[0]?.name||'', label:((rel['label-info']||[])[0]?.label?.name)||'', cover:`https://coverartarchive.org/release/${rel.id}/front-250`, source:'MusicBrainz' };
        });
        try{ localStorage.setItem(ckey,JSON.stringify({ts:Date.now(),data:results})); }catch{}
        return results;
    }

    // Récupère toutes les pochettes dispo (front + back) pour un release MusicBrainz
    // Récupère les pochettes selon la source (MusicBrainz ou Discogs)
    async function fetchCovers(resultId){
        // Pour un résultat Discogs : cherche sur Discogs uniquement
        if(resultId && resultId.startsWith('dc-')){
            return fetchDiscogsCovers(resultId.replace('dc-',''));
        }
        // Pour MusicBrainz : cherche sur Cover Art Archive ET Discogs en parallèle
        const [mbCovers, dcCovers] = await Promise.allSettled([
            fetchMBCovers(resultId),
            fetchDiscogsByMBID(resultId)
        ]);
        const mb = mbCovers.status==='fulfilled' ? mbCovers.value : [];
        const dc = dcCovers.status==='fulfilled' ? dcCovers.value : [];
        // Fusionne sans doublons (MB en priorité, Discogs pour ce qui manque)
        const merged = [...mb];
        dc.forEach(dcImg => {
            const alreadyHave = merged.some(m => m.label===dcImg.label);
            if(!alreadyHave) merged.push(dcImg);
        });
        return merged.length ? merged : mb.length ? mb : dc;
    }

    // Cherche les images Discogs via le MBID (MusicBrainz ID)
    async function fetchDiscogsByMBID(mbId){
        try{
            const token=localStorage.getItem('discogsToken');
            if(!token) return [];
            const r=await fetch('https://api.discogs.com/database/search?type=release&format=CD&per_page=1&page=1&q='+mbId,{
                headers:{'Authorization':'Discogs token='+token,'User-Agent':'Collectioner/2.0'}
            });
            if(!r.ok) return [];
            const data=await r.json();
            const first=(data.results||[])[0];
            if(!first) return [];
            return fetchDiscogsCovers(first.id);
        }catch{ return []; }
    }

    async function fetchMBCovers(mbId){
        try{
            const r=await fetch('https://coverartarchive.org/release/'+mbId,{headers:{'Accept':'application/json'}});
            if(!r.ok) return [];
            const data=await r.json();
            return (data.images||[]).map(img=>({
                url: img.thumbnails?.['500']||img.thumbnails?.large||img.image,
                urlFull: img.image,
                front: img.front,
                back: img.back,
                label: img.front?'Avant':img.back?'Arrière':'Autre'
            }));
        }catch{ return []; }
    }

    async function fetchDiscogsCovers(dcId){
        try{
            const token=localStorage.getItem('discogsToken');
            const headers={'User-Agent':'Collectioner/2.0'};
            if(token) headers['Authorization']='Discogs token='+token;
            const r=await fetch('https://api.discogs.com/releases/'+dcId,{headers});
            if(!r.ok) return [];
            const data=await r.json();
            const images=(data.images||[]);
            if(!images.length) return [];
            // Discogs retourne primary (front) et secondary (back/autres)
            return images.map((img,i)=>({
                url: img.uri150||img.uri,
                urlFull: img.uri,
                front: img.type==='primary',
                back: img.type==='secondary' && i===1,
                label: img.type==='primary'?'Avant':('Photo '+(i+1))
            }));
        }catch{ return []; }
    }

    const DC_TTL=86400000;
    async function searchDiscogs(q){
        const ckey='discogs_cache_'+q.slice(0,50).replace(/\W/g,'_');
        try{ const c=JSON.parse(localStorage.getItem(ckey)||'null'); if(c&&Date.now()-c.ts<DC_TTL) return c.data; }catch{}
        const isBC=/^\d{8,14}$/.test(q.trim());
        const params=new URLSearchParams({type:'release',per_page:'5',page:'1'});
        if(isBC) params.set('barcode',q); else params.set('q',q);
        const token=localStorage.getItem('discogsToken');
        const headers={'User-Agent':'Collectioner/2.0'};
        if(token) headers['Authorization']='Discogs token='+token;
        const r=await fetch('https://api.discogs.com/database/search?'+params,{headers});
        if(!r.ok) throw new Error('Discogs HTTP '+r.status);
        const data=await r.json();
        const results=(data.results||[]).slice(0,5).map(res=>{
            const p=(res.title||'').split(' - ');
            return { id:'dc-'+res.id, title:p[1]||res.title, artist:p[0]||'', year:res.year||'', genre:(res.genre||[])[0]||'', label:(res.label||[])[0]||'', cover:res.cover_image||'', source:'Discogs' };
        });
        try{ localStorage.setItem(ckey,JSON.stringify({ts:Date.now(),data:results})); }catch{}
        return results;
    }

    async function doApiSearch(){
        const q=document.getElementById('apiQ').value.trim();
        if(!q) return;
        document.getElementById('apiSt').textContent='⏳ Recherche en cours...';
        document.getElementById('apiRes').innerHTML='';
        try {
            // Les deux APIs en parallèle
            const [mbRes, dcRes] = await Promise.allSettled([searchMB(q), searchDiscogs(q)]);
            const mb = mbRes.status==='fulfilled' ? mbRes.value : [];
            const dc = dcRes.status==='fulfilled' ? dcRes.value : [];

            // Fusion en intercalant : MB1, DC1, MB2, DC2...
            const merged=[];
            const max=Math.max(mb.length, dc.length);
            for(let i=0;i<max;i++){
                if(mb[i]) merged.push(mb[i]);
                if(dc[i]) merged.push(dc[i]);
            }

            const total=merged.length;
            const mbCount=mb.length, dcCount=dc.length;
            document.getElementById('apiSt').textContent=total
                ? 'MusicBrainz: '+mbCount+' • Discogs: '+dcCount+' — '+total+' résultat(s)'
                : 'Aucun résultat.';
            window._apiResults=merged;
            renderApiResults(merged);
        } catch(e){
            document.getElementById('apiSt').textContent='❌ '+e.message;
        }
    }

    function renderApiResults(results){
        const el=document.getElementById('apiRes');
        if(!results.length){ el.innerHTML='<div style="padding:8px;opacity:.4;font-size:.83rem;">Aucun résultat</div>'; return; }
        const frag=document.createDocumentFragment();
        results.forEach((r,i)=>{
            const row=document.createElement('div');
            row.className='res-item';

            // Miniature cliquable
            const thumb=document.createElement('div');
            thumb.className='res-thumb';
            thumb.style.position='relative';
            if(r.cover){
                thumb.style.backgroundImage='url('+r.cover+')';
                thumb.style.cursor='pointer';
                thumb.title='Voir les pochettes';
                const badge=document.createElement('div');
                badge.textContent='🔍';
                badge.style.cssText='position:absolute;bottom:1px;right:2px;font-size:.7rem;background:rgba(0,0,0,.7);border-radius:2px;padding:1px 3px;';
                thumb.appendChild(badge);
                thumb.onclick=function(e){ openCoverLightbox(i,e); };
            } else {
                thumb.textContent='🎵';
            }

            // Infos
            const info=document.createElement('div');
            info.style.cssText='flex:1;min-width:0;';
            const title=document.createElement('div');
            title.className='res-title';
            title.textContent=r.title+(r.year?' ('+r.year+')':'');
            const sub=document.createElement('div');
            sub.className='res-sub';
            sub.textContent=(r.artist||'—')+(r.label?' • '+r.label:'');
            info.appendChild(title);
            info.appendChild(sub);

            // Bouton choisir
            const btn=document.createElement('button');
            btn.textContent='✓ Choisir';
            btn.style.cssText='background:#00ff88;color:#000;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-family:Rajdhani,sans-serif;font-weight:700;font-size:.8rem;flex-shrink:0;';
            btn.onclick=function(){ applyResult(i); };

            row.appendChild(thumb);
            row.appendChild(info);
            row.appendChild(btn);
            frag.appendChild(row);
        });
        el.innerHTML='';
        el.appendChild(frag);
    }

    // Lightbox pour voir et choisir les pochettes avant/arrière
    let _lbCovers=[], _lbCurIdx=0, _lbResultIdx=0;

    async function openCoverLightbox(resultIdx, e){
        e.stopPropagation();
        const r=window._apiResults[resultIdx];
        if(!r) return;
        _lbResultIdx=resultIdx;
        document.getElementById('lbImg').src='';
        document.getElementById('lbTabs').innerHTML='<span style="color:#0ff;font-size:.8rem;">⏳ Chargement des pochettes...</span>';
        document.getElementById('coverLightbox').classList.add('active');
        const covers=await fetchCovers(r.id);
        if(!covers.length){
            // Fallback : juste le front-250 connu
            _lbCovers=[{url:r.cover, urlFull:r.cover, front:true, back:false, label:'Avant'}];
        } else {
            _lbCovers=covers;
        }
        _lbCurIdx=0;
        renderLightbox();
    }

    function renderLightbox(){
        const tabs=document.getElementById('lbTabs');
        const img=document.getElementById('lbImg');
        tabs.innerHTML=_lbCovers.map((c,i)=>`
            <button class="lightbox-tab${i===_lbCurIdx?' active':''}" onclick="switchLbTab(${i})">${c.label}</button>
        `).join('');
        img.src=_lbCovers[_lbCurIdx]?.url||'';
    }

    function switchLbTab(i){
        _lbCurIdx=i;
        renderLightbox();
    }

    function applyLightboxCover(){
        const cover=_lbCovers[_lbCurIdx];
        if(!cover) return;
        setPreviewUrl(cover.urlFull||cover.url);
        // Aussi appliquer les infos du résultat si form vide
        const r=window._apiResults[_lbResultIdx];
        if(r){
            if(!document.getElementById('fTitle').value) document.getElementById('fTitle').value=r.title||'';
            if(!document.getElementById('fArtist').value) document.getElementById('fArtist').value=r.artist||'';
            if(!document.getElementById('fYear').value) document.getElementById('fYear').value=r.year||'';
            if(!document.getElementById('fGenre').value) document.getElementById('fGenre').value=r.genre||'';
            if(!document.getElementById('fLabel').value) document.getElementById('fLabel').value=r.label||'';
        }
        closeLightbox();
        showToast('🖼️ Pochette sélectionnée !');
    }

    // Agrandir la pochette d'un CD déjà dans la collection
    function openItemCover(url){
        _lbCovers=[{url:url, urlFull:url, label:'Pochette'}];
        _lbCurIdx=0;
        _lbResultIdx=-1;
        document.getElementById('lbTabs').innerHTML='';
        document.getElementById('lbImg').src=url;
        // Cacher le bouton "utiliser" car c'est juste pour voir
        document.querySelector('.lightbox-select').style.display='none';
        document.getElementById('coverLightbox').classList.add('active');
    }

    function closeLightbox(){
        document.getElementById('coverLightbox').classList.remove('active');
        document.getElementById('lbImg').src='';
        document.querySelector('.lightbox-select').style.display='';
        _lbCovers=[];
    }

    function applyResult(i){
        const r=window._apiResults[i];
        if(!r) return;
        document.getElementById('fTitle').value=r.title||'';
        document.getElementById('fArtist').value=r.artist||'';
        document.getElementById('fYear').value=r.year||'';
        document.getElementById('fGenre').value=r.genre||'';
        document.getElementById('fLabel').value=r.label||'';
        if(r.cover) setPreviewUrl(r.cover);
        document.getElementById('apiRes').innerHTML='';
        document.getElementById('apiSt').textContent='✅ Informations importées — vérifiez et complétez !';
    }

    function openScanner(){ document.getElementById('scannerOverlay').classList.add('active'); startScanner(); }
    function closeScanner(){ stopScanner(); document.getElementById('scannerOverlay').classList.remove('active'); }

    async function startScanner(){
        if(!window.isSecureContext){
            showToast('⚠ Scanner requis HTTPS',true);
            closeScanner(); return;
        }
        try{
            scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
            const vid=document.getElementById('scanVideo');
            vid.srcObject=scanStream;
            if(typeof ZXing!=='undefined'){
                codeReader=new ZXing.BrowserMultiFormatReader();
                codeReader.decodeFromVideoElement(vid,(result,err)=>{
                    if(result){ closeScanner(); document.getElementById('apiQ').value=result.getText(); doApiSearch(); }
                });
            } else {
                showToast('⚠ Scanner non disponible',true);
                closeScanner();
            }
        }catch(e){
            showToast('❌ Caméra : '+e.message,true);
            closeScanner();
        }
    }
    function stopScanner(){
        if(codeReader) try{codeReader.reset();}catch{}
        if(scanStream) scanStream.getTracks().forEach(t=>t.stop());
        scanStream=null; codeReader=null;
    }

    function saveItem(){
        const title=document.getElementById('fTitle').value.trim();
        if(!title){ document.getElementById('modalMsg').innerHTML='<div class="err-msg">⚠ Le titre est obligatoire</div>'; return; }
        const coverFile=document.getElementById('fCoverFile').files[0];
        const coverUrl=document.getElementById('fCoverUrl').value.trim();
        const doSave=cover=>{
            const list=loadUser();
            const existing=editingId?list.find(i=>i.id===editingId):null;
            const item={
                id:editingId||('cd-'+Date.now()),
                title,
                artist:document.getElementById('fArtist').value.trim(),
                year:document.getElementById('fYear').value.trim(),
                genre:document.getElementById('fGenre').value.trim(),
                label:document.getElementById('fLabel').value.trim(),
                discCount:document.getElementById('fDiscCount').value,
                size:document.getElementById('fSize').value,
                color:document.getElementById('fColor').value.trim(),
                diskState:document.getElementById('fDiskSt').value,
                pochetteState:document.getElementById('fPochSt').value,
                pochettePresent:document.getElementById('fPochPres').value,
                price:parseFloat(document.getElementById('fPrice').value)||0,
                value:parseFloat(document.getElementById('fValue').value)||0,
                edition:document.getElementById('fEdition').value.trim(),
                loanTo:document.getElementById('fLoan').value.trim(),
                notes:document.getElementById('fNotes').value.trim(),
                cover:cover!==undefined?cover:(existing?existing.cover:null)
            };
            if(editingId){ const idx=list.findIndex(i=>i.id===editingId); if(idx>=0)list[idx]=item; else list.push(item); }
            else list.push(item);
            saveUser(list); render(); closeModal();
            showToast(editingId?'✏️ CD modifié !':'✅ CD ajouté !');
        };
        if(coverFile){ const rd=new FileReader(); rd.onload=e=>doSave(e.target.result); rd.readAsDataURL(coverFile); }
        else doSave(coverUrl||undefined);
    }

    // CORRECTION : editItem réécrit proprement, sans la boucle forEach foireuse
    function editItem(id){
        const item=loadUser().find(i=>i.id===id); if(!item) return;
        editingId=id;
        document.getElementById('modalTitle').textContent='Modifier CD';
        document.getElementById('btnSave').textContent='✓ Modifier';
        document.getElementById('fTitle').value=item.title||'';
        document.getElementById('fArtist').value=item.artist||'';
        document.getElementById('fYear').value=item.year||'';
        document.getElementById('fGenre').value=item.genre||'';
        document.getElementById('fLabel').value=item.label||'';
        document.getElementById('fColor').value=item.color||'';
        document.getElementById('fEdition').value=item.edition||'';
        document.getElementById('fLoan').value=item.loanTo||'';
        document.getElementById('fNotes').value=item.notes||'';
        document.getElementById('fDiscCount').value=item.discCount||'1';
        document.getElementById('fSize').value=item.size||'CD';
        document.getElementById('fDiskSt').value=item.diskState||'';
        document.getElementById('fPochSt').value=item.pochetteState||'';
        document.getElementById('fPochPres').value=item.pochettePresent||'';
        document.getElementById('fPrice').value=item.price||'';
        document.getElementById('fValue').value=item.value||'';
        document.getElementById('fCoverFile').value='';
        setPreviewUrl(item.cover||'');
        document.getElementById('modalMsg').innerHTML='';
        document.getElementById('apiRes').innerHTML='';
        document.getElementById('apiQ').value='';
        document.getElementById('apiSt').textContent='';
        document.getElementById('addModal').classList.add('active');
    }

    function deleteItem(id){
        if(!confirm('Supprimer ce CD ?')) return;
        saveUser(loadUser().filter(i=>i.id!==id));
        render();
        showToast('🗑️ CD supprimé');
    }

    let toastTimer;
    function showToast(msg,err=false){
        const t=document.getElementById('toast');
        t.textContent=msg; t.className='toast show'+(err?' error':'');
        clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
    }

    window.addEventListener('load',async()=>{ await loadFromGist(); render(); });
    </script>
