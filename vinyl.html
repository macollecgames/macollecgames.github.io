<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyles — Collectioner</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="gist.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;width:100%;overflow-x:hidden}
        body{font-family:'Rajdhani',sans-serif;}
        body.dark-mode{background:linear-gradient(135deg,#0a0e27 0%,#1a0033 50%,#0f0a25 100%);color:#fff}
        body.light-mode{background:linear-gradient(135deg,#f5f5f5 0%,#e8e8e8 50%,#f0f0f0 100%);color:#333}
        .header{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid;position:sticky;top:0;z-index:50;}
        body.dark-mode .header{background:rgba(10,15,40,.97);border-color:#ff0088;}
        body.light-mode .header{background:rgba(255,255,255,.97);border-color:#ddd;}
        .back-btn{background:#ff0088;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:700;font-family:'Rajdhani',sans-serif;font-size:.95rem;}
        body.light-mode .back-btn{background:#333;}
        .page-title{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:900;color:#ff0088;}
        body.light-mode .page-title{color:#333;}
        .stats-text{font-size:.85rem;color:#ff0088;}
        body.light-mode .stats-text{color:#666;}
        .search-zone{padding:14px 20px;display:flex;gap:10px;flex-wrap:wrap;}
        .search-bar{flex:1;min-width:0;display:flex;align-items:center;border:2px solid #ff0088;border-radius:8px;padding:0 12px;overflow:hidden;}
        body.dark-mode .search-bar{background:rgba(10,15,40,.6);}
        body.light-mode .search-bar{background:#fff;border-color:#ddd;}
        .search-bar input{background:transparent;border:none;outline:none;color:inherit;padding:9px 4px;width:100%;font-family:'Rajdhani',sans-serif;font-size:.95rem;}
        .btn-add{background:#00ff88;color:#000;border:none;padding:9px 18px;border-radius:8px;cursor:pointer;font-weight:700;font-family:'Rajdhani',sans-serif;font-size:.95rem;}
        .container{padding:0 20px 20px;max-width:1400px;margin:0 auto;}
        .controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;padding-top:14px;}
        .sort-sel{padding:8px 12px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:.9rem;cursor:pointer;}
        body.dark-mode .sort-sel{background:rgba(10,15,40,.6);border:2px solid #ff0088;color:#fff;}
        body.light-mode .sort-sel{background:#fff;border:2px solid #ddd;color:#333;}
        .view-btns{display:flex;gap:6px;}
        .view-btn{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-family:'Rajdhani',sans-serif;font-size:.9rem;}
        body.dark-mode .view-btn{background:#ff0088;color:#fff;}
        body.light-mode .view-btn{background:#333;color:#fff;}
        .view-btn.active{background:#00ff88;color:#000;}
        .stats-panel{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:18px;padding:14px;border-radius:10px;}
        body.dark-mode .stats-panel{background:rgba(255,0,136,.06);border:2px solid rgba(255,0,136,.2);}
        body.light-mode .stats-panel{background:rgba(0,0,0,.04);border:2px solid #e0e0e0;}
        .stat-item{text-align:center;}
        .stat-val{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:700;color:#ff0088;}
        body.light-mode .stat-val{color:#333;}
        .stat-lbl{font-size:.78rem;opacity:.55;margin-top:2px;}

        /* === Grille vinyle === */
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:24px 16px;}
        .vinyl-box{cursor:pointer;width:190px;justify-self:center;display:flex;flex-direction:column;gap:8px;}
        @media(max-width:768px){
            .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:18px 12px;}
            .vinyl-box{width:160px;}
            .vinyl-card{width:160px!important;height:160px!important;}
            .vinyl-title{font-size:.67rem;}
        }
        @media(max-width:480px){
            .grid{grid-template-columns:repeat(2,1fr);gap:14px 10px;}
            .vinyl-box{width:100%;}
            .vinyl-card{width:100%!important;height:0!important;padding-bottom:100%;position:relative;}
            .vinyl-cover{position:absolute!important;top:0;left:0;right:0;bottom:0;}
            .vinyl-actions{position:absolute!important;}
            .vinyl-title{font-size:.65rem;}
            .vinyl-artist{font-size:.6rem;}
        }
        .vinyl-card{
            width:190px;height:190px;position:relative;flex-shrink:0;
            border-radius:3px;overflow:hidden;
            transition:transform .3s ease,box-shadow .3s ease;
            box-shadow:4px 5px 14px rgba(0,0,0,.8);
        }
        body.dark-mode .vinyl-card{background:#1a0a20;border:2px solid rgba(255,0,136,.4);}
        body.light-mode .vinyl-card{background:#e0d0e8;border:2px solid #ccc;}
        .vinyl-box:hover .vinyl-card{
            transform:perspective(600px) rotateY(-8deg) rotateX(3deg) translateX(3px);
            box-shadow:10px 12px 28px rgba(0,0,0,.9);
        }
        .vinyl-cover{position:absolute;top:0;left:0;right:0;bottom:0;}
        .vinyl-cover-img{
            width:100%;height:100%;
            background-size:cover;background-repeat:no-repeat;background-position:center;
            display:flex;align-items:center;justify-content:center;font-size:2.5rem;
        }
        body.dark-mode .vinyl-cover-img{background-color:#1a0a20;}
        body.light-mode .vinyl-cover-img{background-color:#e0d0e8;}
        .vinyl-gloss{position:absolute;top:0;left:0;right:0;height:35%;background:linear-gradient(180deg,rgba(255,255,255,.12) 0%,transparent 100%);pointer-events:none;z-index:5;}
        .vinyl-info{padding:0 2px;}
        .vinyl-title{font-size:.7rem;font-weight:700;color:#ff0088;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        body.light-mode .vinyl-title{color:#333;}
        .vinyl-artist{font-size:.62rem;color:rgba(255,255,255,.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
        body.light-mode .vinyl-artist{color:#555;}
        .vinyl-year{font-size:.58rem;color:rgba(255,255,255,.35);margin-top:1px;}
        /* Boutons action — hover PC, toujours visible mobile */
        .vinyl-actions{position:absolute;top:4px;right:4px;display:flex;gap:4px;z-index:10;}
        @media(hover:hover){.vinyl-actions{opacity:0;transition:.25s;}.vinyl-box:hover .vinyl-actions{opacity:1;}}
        .vinyl-actions button{background:rgba(0,0,0,.8);color:#ff0088;border:1px solid rgba(255,0,136,.35);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:.72rem;font-weight:700;}
        .vinyl-actions button:hover{background:#00ff88;color:#000;border-color:#00ff88;}

        /* === Vue liste === */
        .list-view{display:flex;flex-direction:column;gap:10px;}
        .list-item{display:flex;gap:14px;align-items:center;padding:14px;border-radius:8px;}
        body.dark-mode .list-item{background:rgba(10,15,40,.6);border:2px solid rgba(255,0,136,.25);}
        body.light-mode .list-item{background:#fff;border:2px solid #e0e0e0;}
        .list-cover{width:72px;height:72px;border-radius:5px;background-size:cover;background-position:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.8rem;}
        body.dark-mode .list-cover{background-color:#1a0a20;}
        body.light-mode .list-cover{background-color:#e8e8e8;}
        .list-info{flex:1;min-width:0;}
        .list-title{font-size:1rem;font-weight:700;color:#ff0088;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        body.light-mode .list-title{color:#333;}
        .list-sub{font-size:.85rem;opacity:.7;}
        .list-meta{font-size:.78rem;opacity:.5;margin-top:2px;}
        .list-actions{display:flex;gap:6px;flex-shrink:0;}

        /* Badges */
        .loan-badge{font-size:.62rem;background:rgba(255,170,0,.12);color:#fa0;border:1px solid rgba(255,170,0,.3);border-radius:3px;padding:1px 5px;margin-left:4px;}
        .empty-msg{opacity:.4;text-align:center;padding:50px;grid-column:1/-1;font-size:1.1rem;}
        .state-badge{position:absolute;top:5px;left:5px;z-index:6;padding:2px 6px;border-radius:3px;font-size:.55rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
        .state-neuf{background:#00ff88;color:#000;}
        .state-excellent{background:#0cf;color:#000;}
        .state-bon{background:#ff0088;color:#fff;}
        .state-acceptable{background:#ff8800;color:#fff;}
        .state-use{background:#ff2255;color:#fff;}
        .cover-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;opacity:.5;}
        .cover-placeholder .ph-disc{font-size:2.8rem;filter:drop-shadow(0 0 8px rgba(255,0,136,.4));}
        .cover-placeholder .ph-title{font-size:.6rem;font-family:'Rajdhani',sans-serif;font-weight:700;color:#ff0088;text-align:center;padding:0 8px;line-height:1.2;}

        /* Boutons génériques */
        .btn{padding:9px 18px;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-family:'Rajdhani',sans-serif;font-size:.9rem;transition:.2s;}
        .btn:hover{opacity:.85;}
        .btn-primary{background:#00ff88;color:#000;}
        .btn-ghost{border:2px solid rgba(255,0,136,.3);background:transparent;color:#ff0088;}
        body.light-mode .btn-ghost{border-color:#ccc;color:#666;}
        .btn-danger{background:rgba(255,0,136,.1);color:#ff0088;border:2px solid rgba(255,0,136,.2);}

        /* Filtres */
        .filters{display:flex;gap:8px;flex-wrap:wrap;padding:0 20px 12px;}
        .filter-sel{padding:7px 10px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:.85rem;cursor:pointer;}
        body.dark-mode .filter-sel{background:rgba(10,15,40,.6);border:2px solid rgba(255,0,136,.25);color:#fff;}
        body.light-mode .filter-sel{background:#fff;border:2px solid #ddd;color:#333;}
        .filter-sel option{background:#0d1230;}
        .btn-export{background:rgba(255,0,136,.12);color:#ff0088;border:2px solid rgba(255,0,136,.25);padding:7px 12px;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;transition:.2s;}
        .btn-export:hover{background:rgba(255,0,136,.25);}
        .btn-del-sel{background:rgba(255,34,85,.15);color:#ff2255;border:2px solid rgba(255,34,85,.3);padding:7px 12px;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;display:none;transition:.2s;}
        .btn-del-sel.visible{display:inline-block;}
        .vinyl-box.selected .vinyl-card{outline:3px solid #00ff88;outline-offset:2px;}
        .select-mode-bar{display:none;padding:8px 20px;background:rgba(0,255,136,.08);border-bottom:1px solid rgba(0,255,136,.2);align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
        .select-mode-bar.active{display:flex;}
        .select-mode-bar span{font-size:.85rem;color:#0f8;font-weight:700;}

        /* Pagination */
        .pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:20px 0 10px;flex-wrap:wrap;}
        .pg-btn{padding:7px 13px;border:2px solid rgba(255,0,136,.25);background:transparent;color:#ff0088;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;transition:.2s;min-width:38px;}
        .pg-btn:hover{background:rgba(255,0,136,.15);}
        .pg-btn.active{background:#ff0088;color:#fff;border-color:#ff0088;}
        .pg-btn:disabled{opacity:.3;cursor:not-allowed;}
        .pg-info{font-size:.8rem;opacity:.5;padding:0 6px;}

        /* Modal */
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:flex-start;justify-content:center;padding:10px;overflow-y:auto;}
        .modal.active{display:flex;}
        .modal-content{border-radius:10px;padding:18px;max-width:720px;width:100%;margin:auto;position:relative;max-height:calc(100dvh - 20px);overflow-y:auto;}
        body.dark-mode .modal-content{background:#0d1230;border:2px solid #ff0088;}
        body.light-mode .modal-content{background:#fff;border:2px solid #ddd;}
        .modal-title{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;color:#ff0088;margin-bottom:16px;}
        body.light-mode .modal-title{color:#333;}
        .close-btn{position:absolute;top:12px;right:12px;background:#ff0088;color:#fff;border:none;padding:5px 11px;border-radius:5px;cursor:pointer;font-weight:700;}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
        @media(max-width:480px){.modal-content{padding:12px;max-height:100dvh;margin:0;}.form-grid{grid-template-columns:1fr;}#scanVideo video,#scanVideo{max-width:100%!important;width:100%!important;}}
        .form-full{grid-column:1/-1;}
        .form-group{display:flex;flex-direction:column;gap:5px;}
        .lbl{font-size:.83rem;font-weight:600;opacity:.75;}
        .req{color:#ff0088;}
        .input,.sel,.txtarea{padding:9px 12px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:.9rem;transition:.3s;width:100%;}
        body.dark-mode .input,body.dark-mode .sel,body.dark-mode .txtarea{background:#0d1a2e;border:2px solid rgba(255,0,136,.2);color:#fff;}
        body.dark-mode .sel option{background:#0d1a2e;color:#fff;}
        body.light-mode .sel option{background:#fff;color:#333;}
        body.light-mode .input,body.light-mode .sel,body.light-mode .txtarea{background:#f8f8f8;border:2px solid #e0e0e0;color:#333;}
        .input:focus,.sel:focus,.txtarea:focus{outline:none;}
        body.dark-mode .input:focus,body.dark-mode .sel:focus,body.dark-mode .txtarea:focus{border-color:#ff0088;}
        .txtarea{min-height:70px;resize:vertical;}
        .preview{width:100%;height:200px;border-radius:6px;margin-top:8px;background-size:contain;background-position:center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center;font-size:3rem;}
        body.dark-mode .preview{background-color:rgba(255,0,136,.05);border:2px dashed rgba(255,0,136,.2);}
        body.light-mode .preview{background-color:#f0f0f0;border:2px dashed #ddd;}
        .btn-row{display:flex;gap:10px;margin-top:16px;}
        .err-msg{padding:10px;border-radius:5px;font-size:.85rem;font-weight:700;margin-top:8px;background:rgba(255,0,136,.1);border:2px solid rgba(255,0,136,.3);color:#ff0088;}

        /* Zone recherche */
        .api-zone{padding:14px;border-radius:8px;margin-bottom:16px;}
        body.dark-mode .api-zone{background:rgba(255,0,136,.05);border:2px solid rgba(255,0,136,.2);}
        body.light-mode .api-zone{background:#fff8fc;border:2px solid #f0d0e0;}
        .api-zone-title{font-size:.83rem;font-weight:700;margin-bottom:10px;color:#ff0088;display:flex;align-items:center;gap:6px;}
        .api-row{display:flex;gap:8px;}
        .api-input{flex:1;padding:9px 12px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:.9rem;}
        body.dark-mode .api-input{background:rgba(0,0,0,.3);border:2px solid rgba(255,0,136,.2);color:#fff;}
        body.light-mode .api-input{background:#fff;border:2px solid #ddd;color:#333;}
        .api-input:focus{outline:none;border-color:#ff0088;}
        .btn-scan-sm{background:#ff0088;color:#fff;border:none;padding:9px 13px;border-radius:6px;font-weight:700;font-size:.9rem;}
        .btn-search-sm{background:rgba(255,0,136,.15);color:#ff0088;border:2px solid rgba(255,0,136,.3);padding:9px 13px;border-radius:6px;cursor:pointer;font-weight:700;font-family:'Rajdhani',sans-serif;font-size:.9rem;}
        .api-status{font-size:.75rem;opacity:.6;margin-top:6px;display:block;}
        .results-list{margin-top:8px;display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto;}
        .res-item{display:flex;gap:10px;align-items:center;padding:7px 10px;border-radius:6px;cursor:pointer;transition:.2s;}
        body.dark-mode .res-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,0,136,.15);}
        body.light-mode .res-item{background:#f8f8f8;border:1px solid #e0e0e0;}
        .res-item:hover{border-color:#ff0088;}
        .res-thumb{width:38px;height:38px;border-radius:4px;background-size:cover;background-position:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;position:relative;}
        body.dark-mode .res-thumb{background-color:#1a0a20;}
        body.light-mode .res-thumb{background-color:#e0e0e0;}
        .res-title{font-size:.85rem;font-weight:700;}
        .res-sub{font-size:.72rem;opacity:.5;}

        /* Lightbox */
        .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:10px;padding:16px;overflow-y:auto;}
        .lightbox.active{display:flex;}
        .lightbox-img{width:min(430px,75vw);height:min(430px,75vw);min-width:min(430px,75vw);min-height:min(430px,75vw);max-width:min(430px,75vw);max-height:min(430px,75vw);border-radius:8px;border:2px solid #ff0088;object-fit:contain;background:#111;flex-shrink:0;}
        .lightbox-tabs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:min(500px,85vw);padding-bottom:4px;}
        .lightbox-tab{padding:8px 20px;border:2px solid rgba(255,0,136,.3);background:transparent;color:#ff0088;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.9rem;transition:.2s;}
        .lightbox-tab.active{background:#ff0088;color:#fff;}
        .lightbox-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
        .lightbox-select{background:#00ff88;color:#000;border:none;padding:9px 22px;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.95rem;}
        .lightbox-slot{background:rgba(255,0,136,.15);color:#ff0088;border:2px solid rgba(255,0,136,.3);padding:9px 14px;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;transition:.2s;}
        .lightbox-slot:hover{background:#ff0088;color:#fff;}
        .lightbox-slot.assigned{background:#00ff88;color:#000;border-color:#00ff88;}
        .lightbox-close{background:rgba(255,255,255,.1);color:#fff;border:none;padding:9px 18px;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.95rem;}
        .lightbox-info{text-align:center;max-width:min(500px,85vw);}
        .lightbox-info-title{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;color:#ff0088;margin-bottom:3px;}
        .lightbox-info-sub{font-size:.85rem;color:rgba(255,255,255,.7);}

        /* Toast */
        .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#00ff88;color:#000;font-weight:700;font-size:.9rem;padding:11px 24px;border-radius:8px;z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;font-family:'Rajdhani',sans-serif;}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
        .toast.error{background:#ff0088;color:#fff;}
    </style>
</head>
<body class="dark-mode">
    <div class="header">
        <button class="back-btn" tabindex="-1" onclick="window.location.href='collectioner.html'" onkeydown="event.preventDefault()">← Retour</button>
        <div class="page-title">📀 VINYLES</div>
        <div class="stats-text" id="statsText">0 Vinyles</div>
    </div>

    <div class="search-zone">
        <div class="search-bar"><input type="text" id="searchInput" placeholder="Rechercher..." oninput="debouncedFilter()"></div>
        <button class="btn-add" onclick="openAddModal()">+ Ajouter</button>
    </div>

    <div class="select-mode-bar" id="selectBar">
        <span id="selectCount">0 sélectionné(s)</span>
        <div style="display:flex;gap:8px;">
            <button class="btn-del-sel visible" onclick="deleteSelected()">🗑️ Supprimer la sélection</button>
            <button style="background:transparent;border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:5px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;" onclick="exitSelectMode()">✕ Annuler</button>
        </div>
    </div>

    <div class="filters">
        <select id="filterGenre" class="filter-sel" onchange="applyFilters()"><option value="">Tous les genres</option></select>
        <select id="filterEtat" class="filter-sel" onchange="applyFilters()">
            <option value="">Tous les états</option>
            <option>Neuf</option><option>Excellent</option><option>Bon</option><option>Acceptable</option><option>Usé</option>
        </select>
        <select id="filterPret" class="filter-sel" onchange="applyFilters()">
            <option value="">Tous</option>
            <option value="pret">Prêtés seulement</option>
            <option value="dispo">Disponibles</option>
        </select>
        <button class="btn-export" onclick="exportCSV()">⬇ CSV</button>
        <button style="background:rgba(255,0,136,.1);color:#ff0088;border:2px solid rgba(255,0,136,.2);padding:7px 12px;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;" onclick="toggleSelectMode()">☑ Sélectionner</button>
    </div>

    <div class="container">
        <div class="controls">
            <select id="sortSel" class="sort-sel" onchange="onSort()">
                <option value="">Trier par...</option>
                <option value="title-asc">Titre A-Z</option>
                <option value="title-desc">Titre Z-A</option>
                <option value="artist-asc">Artiste A-Z</option>
                <option value="value-desc">Valeur ↓</option>
                <option value="year-desc">Année récente</option>
            </select>
            <div class="view-btns">
                <button class="view-btn active" onclick="switchView('grid',this)">▦ Grille</button>
                <button class="view-btn" onclick="switchView('list',this)">☰ Liste</button>
            </div>
        </div>
        <div class="stats-panel">
            <div class="stat-item"><div class="stat-val" id="stTotal">0</div><div class="stat-lbl">Total</div></div>
            <div class="stat-item"><div class="stat-val" id="stValue">0€</div><div class="stat-lbl">Valeur</div></div>
            <div class="stat-item"><div class="stat-val" id="stLoaned">0</div><div class="stat-lbl">Prêtés</div></div>
        </div>
        <div class="grid" id="itemGrid"></div>
        <div class="list-view" id="itemList" style="display:none;"></div>
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div class="modal-title" id="modalTitle">Ajouter un Vinyle</div>
            <div class="api-zone">
                <div class="api-zone-title">🔍 Recherche automatique</div>
                <div class="api-row">
                    <input type="text" id="apiQ" class="api-input" placeholder="Titre, artiste ou code-barres..." onkeydown="if(event.key==='Enter')doApiSearch()">
                    <button class="btn-search-sm" onclick="doApiSearch()">Chercher</button>
                    <button class="btn-scan-sm" id="btnLiveScan" onclick="toggleLiveScanner()" title="Scanner caméra">📷</button>
                </div>
                <div id="scannerZone" style="display:none;margin-top:10px;border-radius:10px;overflow:hidden;border:2px solid #ff0088;max-width:100%;">
                    <div id="scanVideo" style="width:100%;max-width:100%;overflow:hidden;"></div>
                    <div id="scanMsg" style="text-align:center;font-size:.78rem;color:#ff0088;padding:7px;background:rgba(0,0,0,.7);">Pointez vers le code-barres</div>
                </div>
                <span id="apiSt" class="api-status"></span>
                <div id="apiRes" class="results-list"></div>
            </div>
            <div class="form-grid">
                <div class="form-group form-full"><label class="lbl">Titre <span class="req">*</span></label><input type="text" id="fTitle" class="input"></div>
                <div class="form-group"><label class="lbl">Artiste</label><input type="text" id="fArtist" class="input"></div>
                <div class="form-group"><label class="lbl">Année</label><input type="number" id="fYear" class="input" min="1900" max="2099"></div>
                <div class="form-group"><label class="lbl">Genre</label><input type="text" id="fGenre" class="input"></div>
                <div class="form-group"><label class="lbl">Label</label><input type="text" id="fLabel" class="input"></div>
                <div class="form-group"><label class="lbl">Nb disques</label>
                    <select id="fDiscCount" class="sel"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5+</option></select></div>
                <div class="form-group"><label class="lbl">Tours</label>
                    <select id="fSize" class="sel"><option value="33">33 tours</option><option value="45">45 tours</option><option value="78">78 tours</option></select></div>
                <div class="form-group"><label class="lbl">Couleur</label><input type="text" id="fColor" class="input" placeholder="Noir, Rouge, Translucide..."></div>
                <div class="form-group"><label class="lbl">État disque</label>
                    <select id="fDiskSt" class="sel"><option value="">—</option><option>Neuf</option><option>Excellent</option><option>Bon</option><option>Acceptable</option><option>Usé</option></select></div>
                <div class="form-group"><label class="lbl">État pochette</label>
                    <select id="fPochSt" class="sel"><option value="">—</option><option>Neuf</option><option>Excellent</option><option>Bon</option><option>Acceptable</option><option>Usé</option></select></div>
                <div class="form-group"><label class="lbl">Pochette présente</label>
                    <select id="fPochPres" class="sel"><option value="">—</option><option>Oui</option><option>Non</option></select></div>
                <div class="form-group"><label class="lbl">Édition</label><input type="text" id="fEdition" class="input"></div>
                <div class="form-group"><label class="lbl">Prix payé (€)</label><input type="number" id="fPrice" class="input" step="0.01" min="0"></div>
                <div class="form-group"><label class="lbl">Valeur estimée (€)</label><input type="number" id="fValue" class="input" step="0.01" min="0"></div>
                <div class="form-group form-full"><label class="lbl">Prêté à</label><input type="text" id="fLoan" class="input" placeholder="Nom de la personne"></div>
                <div class="form-group form-full"><label class="lbl">Notes</label><textarea id="fNotes" class="txtarea"></textarea></div>
                <div class="form-group form-full">
                    <label class="lbl">Pochette (URL auto ou upload local)</label>
                    <input type="text" id="fCoverUrl" class="input" placeholder="URL image (remplie automatiquement)">
                    <input type="file" id="fCoverFile" class="input" accept="image/*" onchange="previewFile()" style="margin-top:6px;">
                    <div id="coverPrev" class="preview">📀</div>
                </div>
            </div>
            <input type="hidden" id="fCoverFront">
            <input type="hidden" id="fCoverBack">
            <div id="modalMsg"></div>
            <div class="btn-row">
                <button class="btn btn-primary" id="btnSave" onclick="saveItem()">✓ Ajouter</button>
                <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="coverLightbox">
        <div class="lightbox-info" id="lbInfo" style="display:none;">
            <div class="lightbox-info-title" id="lbInfoTitle"></div>
            <div class="lightbox-info-sub" id="lbInfoSub"></div>
        </div>
        <div class="lightbox-tabs" id="lbTabs"></div>
        <img class="lightbox-img" id="lbImg" src="" alt="pochette">
        <div class="lightbox-actions" id="lbActions">
            <button class="lightbox-slot" onclick="assignSlot('front')">📀 Avant</button>
            <button class="lightbox-slot" onclick="assignSlot('back')">🔙 Arrière</button>
            <button class="lightbox-select" onclick="applyLightboxCovers()">✓ Valider</button>
            <button class="lightbox-close" onclick="closeLightbox()">✕ Fermer</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    (function(){ document.body.className=localStorage.getItem('darkMode')!=='false'?'dark-mode':'light-mode'; })();
    window.addEventListener('storage',e=>{ if(e.key==='darkMode') location.reload(); });

    const KEY='vinylCollection';
    let editingId=null, currentView='grid', filterText='', sortVal='', debTimer;
    let currentPage=1; const PAGE_SIZE=20;
    let filterEtat='', filterGenre='', filterPret='';
    let selectMode=false, selectedIds=new Set();
    window._apiResults=[];

    function loadUser(){ try{ return JSON.parse(localStorage.getItem(KEY))||[]; }catch{ return []; } }
    function saveUser(list){
        try{ localStorage.setItem(KEY,JSON.stringify(list)); saveToGist(); }
        catch(e){
            if(e.name==='QuotaExceededError') showToast('⚠ Stockage plein — supprimez des images locales',true);
            else showToast('⚠ Erreur de sauvegarde',true);
        }
    }
    function getAll(){ return loadUser(); }

    function debouncedFilter(){ clearTimeout(debTimer); debTimer=setTimeout(()=>{ filterText=document.getElementById('searchInput').value.toLowerCase().trim(); currentPage=1; render(); },200); }
    function onSort(){ sortVal=document.getElementById('sortSel').value; currentPage=1; render(); }
    function applyFilters(){
        filterEtat=document.getElementById('filterEtat').value;
        filterGenre=document.getElementById('filterGenre').value;
        filterPret=document.getElementById('filterPret').value;
        currentPage=1; render();
    }

    function populateGenreFilter(){
        const genres=[...new Set(getAll().map(i=>i.genre||'').filter(Boolean))].sort();
        const sel=document.getElementById('filterGenre');
        const cur=sel.value;
        sel.innerHTML='<option value="">Tous les genres</option>'+genres.map(g=>`<option value="${g}"${g===cur?' selected':''}>${g}</option>`).join('');
    }

    function getVisible(){
        let items=getAll();
        if(filterText) items=items.filter(it=>
            (it.title||'').toLowerCase().includes(filterText)||
            (it.artist||'').toLowerCase().includes(filterText)||
            (it.genre||'').toLowerCase().includes(filterText)||
            (it.label||'').toLowerCase().includes(filterText)||
            (it.year||'').toString().includes(filterText)
        );
        if(filterEtat) items=items.filter(it=>it.diskState===filterEtat);
        if(filterGenre) items=items.filter(it=>it.genre===filterGenre);
        if(filterPret==='pret') items=items.filter(it=>it.loanTo);
        if(filterPret==='dispo') items=items.filter(it=>!it.loanTo);
        if(sortVal){ items=[...items]; items.sort((a,b)=>{
            if(sortVal==='title-asc') return (a.title||'').localeCompare(b.title||'');
            if(sortVal==='title-desc') return (b.title||'').localeCompare(a.title||'');
            if(sortVal==='artist-asc') return (a.artist||'').localeCompare(b.artist||'');
            if(sortVal==='value-desc') return (b.value||0)-(a.value||0);
            if(sortVal==='year-desc') return (b.year||0)-(a.year||0);
            return 0;
        }); }
        return items;
    }

    function render(){
        const v=getVisible();
        const total=v.length;
        const pages=Math.max(1,Math.ceil(total/PAGE_SIZE));
        if(currentPage>pages) currentPage=pages;
        const paged=v.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE);
        currentView==='grid'?renderGrid(paged):renderList(paged);
        updateStats(v);
        renderPagination(total,pages);
        populateGenreFilter();
    }

    function renderPagination(total,pages){
        const pg=document.getElementById('pagination');
        if(pages<=1){ pg.innerHTML=''; return; }
        let html=`<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
        for(let i=1;i<=pages;i++){
            if(pages>7&&i>2&&i<pages-1&&Math.abs(i-currentPage)>1){ if(i===3||i===pages-2) html+=`<span class="pg-info">…</span>`; continue; }
            html+=`<button class="pg-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
        }
        html+=`<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>`;
        html+=`<span class="pg-info">${total} éléments</span>`;
        pg.innerHTML=html;
    }
    function goPage(p){ currentPage=p; render(); window.scrollTo({top:0,behavior:'smooth'}); }

    function stateBadge(state){
        if(!state) return '';
        const map={'Neuf':'state-neuf','Excellent':'state-excellent','Bon':'state-bon','Acceptable':'state-acceptable','Usé':'state-use'};
        const cls=map[state]||'';
        return cls?`<div class="state-badge ${cls}">${state}</div>`:'';
    }

    function toggleSelectMode(){ selectMode=!selectMode; selectedIds.clear(); document.getElementById('selectBar').classList.toggle('active',selectMode); document.getElementById('selectCount').textContent='0 sélectionné(s)'; render(); }
    function exitSelectMode(){ selectMode=false; selectedIds.clear(); document.getElementById('selectBar').classList.remove('active'); render(); }
    function toggleSelect(id){
        if(selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
        document.getElementById('selectCount').textContent=selectedIds.size+' sélectionné(s)';
        document.querySelectorAll('.vinyl-box[data-id]').forEach(el=>el.classList.toggle('selected',selectedIds.has(el.dataset.id)));
    }
    function deleteSelected(){
        if(!selectedIds.size) return;
        const count=selectedIds.size;
        if(!confirm(`Supprimer ${count} vinyle(s) ?`)) return;
        saveUser(loadUser().filter(i=>!selectedIds.has(i.id)));
        exitSelectMode();
        showToast('🗑️ '+count+' vinyle(s) supprimé(s)');
    }

    function exportCSV(){
        const items=loadUser();
        if(!items.length){ showToast('⚠ Aucun vinyle à exporter',true); return; }
        const headers=['Titre','Artiste','Année','Genre','Label','Tours','Couleur','État disque','État pochette','Prix','Valeur','Prêté à','Notes'];
        const rows=items.map(v=>[v.title,v.artist,v.year,v.genre,v.label,v.size,v.color,v.diskState,v.pochetteState,v.price,v.value,v.loanTo,v.notes].map(c=>`"${(c||'').toString().replace(/"/g,'""')}"`).join(','));
        const csv=[headers.join(','),...rows].join('\n');
        const a=document.createElement('a');
        a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
        a.download='collection_vinyles.csv';
        a.click();
        showToast('📥 Export CSV téléchargé !');
    }

    function actionBtns(id,sm){
        const s=sm?'font-size:.72rem;padding:4px 8px;':'';
        return `<button class="btn btn-primary" style="${s}" onclick="editItem('${id}')">✏️</button><button class="btn btn-danger" style="${s}" onclick="deleteItem('${id}')">🗑️</button>`;
    }

    function renderGrid(items){
        const g=document.getElementById('itemGrid');
        if(!items.length){ g.innerHTML='<p class="empty-msg">📀 Aucun vinyle trouvé</p>'; return; }
        g.innerHTML=items.map(v=>{
            const disc=v.discCount>1?` (${v.discCount})`:'';
            const loan=v.loanTo?'<span class="loan-badge">📦</span>':'';
            const mainCover=v.coverFront||v.cover||'';
            const hasCovers=!!(v.coverFront||v.coverBack||v.cover);
            const bg=mainCover?`background-image:url(${mainCover});`:'';
            const placeholder=mainCover?'':`<div class="cover-placeholder"><div class="ph-disc">📀</div><div class="ph-title">${v.title}</div></div>`;
            const selClass=selectedIds.has(v.id)?' selected':'';
            return `<div class="vinyl-box${selClass}" data-id="${v.id}" ${selectMode?`onclick="toggleSelect('${v.id}')"`:''}> 
                <div class="vinyl-card">
                    <div class="vinyl-gloss"></div>
                    <div class="vinyl-cover" ${!selectMode&&hasCovers?`onclick="openItemCover('${v.id}')"`:''} style="cursor:${!selectMode&&hasCovers?'zoom-in':selectMode?'pointer':'default'}">
                        <div class="vinyl-cover-img" style="${bg}">${placeholder}</div>
                    </div>
                    ${stateBadge(v.diskState)}
                    ${!selectMode?`<div class="vinyl-actions">${actionBtns(v.id,true)}</div>`:''}
                </div>
                <div class="vinyl-info">
                    <div class="vinyl-title">${v.title}${disc}${loan}</div>
                    <div class="vinyl-artist">${v.artist||''}</div>
                    <div class="vinyl-year">${v.year||''}${v.size?' • '+v.size+' tours':''}</div>
                </div>
            </div>`;
        }).join('');
    }

    function renderList(items){
        const l=document.getElementById('itemList');
        if(!items.length){ l.innerHTML='<p class="empty-msg">📀 Aucun vinyle</p>'; return; }
        l.innerHTML=items.map(v=>{
            const loan=v.loanTo?`<span class="loan-badge">📦 ${v.loanTo}</span>`:'';
            const mainCover=v.coverFront||v.cover||'';
            const hasCovers=!!(v.coverFront||v.coverBack||v.cover);
            const bg=mainCover?`background-image:url(${mainCover});`:'';
            return `<div class="list-item">
                <div class="list-cover" style="${bg};cursor:${hasCovers?'zoom-in':'default'}" ${hasCovers?`onclick="openItemCover('${v.id}')"`:''}>${mainCover?'':'📀'}</div>
                <div class="list-info">
                    <div class="list-title">${v.title}${loan}</div>
                    <div class="list-sub">${v.artist||'—'}${v.year?' • '+v.year:''}</div>
                    <div class="list-meta">${v.genre||'—'} • ${v.size||'33'} tours • ${v.color||'—'} • ${v.diskState||'?'}${v.value?' • '+v.value+'€':''}</div>
                </div>
                <div class="list-actions">${actionBtns(v.id,false)}</div>
            </div>`;
        }).join('');
    }

    function switchView(mode,btn){
        currentView=mode;
        document.getElementById('itemGrid').style.display=mode==='grid'?'grid':'none';
        document.getElementById('itemList').style.display=mode==='list'?'flex':'none';
        document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function updateStats(visible){
        const all=getAll();
        document.getElementById('stTotal').textContent=all.length;
        document.getElementById('stValue').textContent=all.reduce((s,it)=>s+(it.value||0),0).toFixed(0)+'€';
        document.getElementById('stLoaned').textContent=all.filter(it=>it.loanTo).length;
        document.getElementById('statsText').textContent=(filterText?`${visible.length}/`:'')+all.length+' Vinyles';
    }

    function openAddModal(){ editingId=null; document.getElementById('modalTitle').textContent='Ajouter un Vinyle'; document.getElementById('btnSave').textContent='✓ Ajouter'; clearForm(); document.getElementById('addModal').classList.add('active'); document.getElementById('apiQ').focus(); }
    function closeModal(){ stopLiveScanner(); document.getElementById('addModal').classList.remove('active'); document.getElementById('apiRes').innerHTML=''; document.getElementById('apiQ').value=''; document.getElementById('apiSt').textContent=''; }

    function clearForm(){
        ['fTitle','fArtist','fYear','fGenre','fLabel','fColor','fEdition','fLoan','fNotes','fCoverUrl'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
        document.getElementById('fDiscCount').value='1';
        document.getElementById('fSize').value='33';
        document.getElementById('fDiskSt').value='';
        document.getElementById('fPochSt').value='';
        document.getElementById('fPochPres').value='';
        document.getElementById('fPrice').value='';
        document.getElementById('fValue').value='';
        document.getElementById('fCoverFile').value='';
        document.getElementById('fCoverFront').value='';
        document.getElementById('fCoverBack').value='';
        document.getElementById('coverPrev').style.backgroundImage='';
        document.getElementById('coverPrev').textContent='📀';
        document.getElementById('modalMsg').innerHTML='';
    }

    function previewFile(){
        const f=document.getElementById('fCoverFile').files[0];
        if(!f) return;
        if(f.size>500*1024){ showToast('⚠ Image trop lourde (max 500 Ko)',true); document.getElementById('fCoverFile').value=''; return; }
        const r=new FileReader();
        r.onload=e=>{ document.getElementById('coverPrev').style.backgroundImage=`url(${e.target.result})`; document.getElementById('coverPrev').textContent=''; document.getElementById('fCoverUrl').value=''; };
        r.readAsDataURL(f);
    }

    function setPreviewUrl(url){
        document.getElementById('fCoverUrl').value=url;
        document.getElementById('coverPrev').style.backgroundImage=url?`url(${url})`:'';
        document.getElementById('coverPrev').textContent=url?'':'📀';
    }

    function saveItem(){
        const title=document.getElementById('fTitle').value.trim();
        if(!title){ document.getElementById('modalMsg').innerHTML='<div class="err-msg">⚠ Le titre est obligatoire</div>'; return; }
        const coverFile=document.getElementById('fCoverFile').files[0];
        const coverUrl=document.getElementById('fCoverUrl').value.trim();
        const doSave=cover=>{
            const list=loadUser();
            const existing=editingId?list.find(i=>i.id===editingId):null;
            const item={
                id:editingId||('v-'+Date.now()),
                title,
                artist:document.getElementById('fArtist').value.trim(),
                year:document.getElementById('fYear').value.trim(),
                genre:document.getElementById('fGenre').value.trim(),
                label:document.getElementById('fLabel').value.trim(),
                discCount:document.getElementById('fDiscCount').value,
                size:document.getElementById('fSize').value,
                color:document.getElementById('fColor').value.trim(),
                diskState:document.getElementById('fDiskSt').value,
                pochetteState:document.getElementById('fPochSt').value,
                pochettePresent:document.getElementById('fPochPres').value,
                price:parseFloat(document.getElementById('fPrice').value)||0,
                value:parseFloat(document.getElementById('fValue').value)||0,
                edition:document.getElementById('fEdition').value.trim(),
                loanTo:document.getElementById('fLoan').value.trim(),
                notes:document.getElementById('fNotes').value.trim(),
                cover:cover!==undefined?cover:(existing?existing.cover:null),
                coverFront:document.getElementById('fCoverFront').value||(existing?.coverFront||null),
                coverBack:document.getElementById('fCoverBack').value||(existing?.coverBack||null),
            };
            if(editingId){ const idx=list.findIndex(i=>i.id===editingId); if(idx>=0) list[idx]=item; else list.push(item); }
            else list.push(item);
            saveUser(list); render(); closeModal();
            showToast(editingId?'✏️ Vinyle modifié !':'✅ Vinyle ajouté !');
        };
        if(coverFile){ const rd=new FileReader(); rd.onload=e=>doSave(e.target.result); rd.readAsDataURL(coverFile); }
        else doSave(coverUrl||undefined);
    }

    function editItem(id){
        const item=loadUser().find(i=>i.id===id); if(!item) return;
        editingId=id;
        document.getElementById('modalTitle').textContent='Modifier Vinyle';
        document.getElementById('btnSave').textContent='✓ Modifier';
        document.getElementById('fTitle').value=item.title||'';
        document.getElementById('fArtist').value=item.artist||'';
        document.getElementById('fYear').value=item.year||'';
        document.getElementById('fGenre').value=item.genre||'';
        document.getElementById('fLabel').value=item.label||'';
        document.getElementById('fColor').value=item.color||'';
        document.getElementById('fEdition').value=item.edition||'';
        document.getElementById('fLoan').value=item.loanTo||'';
        document.getElementById('fNotes').value=item.notes||'';
        document.getElementById('fDiscCount').value=item.discCount||'1';
        document.getElementById('fSize').value=item.size||'33';
        document.getElementById('fDiskSt').value=item.diskState||'';
        document.getElementById('fPochSt').value=item.pochetteState||'';
        document.getElementById('fPochPres').value=item.pochettePresent||'';
        document.getElementById('fPrice').value=item.price||'';
        document.getElementById('fValue').value=item.value||'';
        document.getElementById('fCoverFile').value='';
        document.getElementById('fCoverFront').value=item.coverFront||'';
        document.getElementById('fCoverBack').value=item.coverBack||'';
        setPreviewUrl(item.coverFront||item.cover||'');
        document.getElementById('modalMsg').innerHTML='';
        document.getElementById('apiRes').innerHTML='';
        document.getElementById('apiQ').value='';
        document.getElementById('apiSt').textContent='';
        document.getElementById('addModal').classList.add('active');
    }

    function deleteItem(id){
        if(!confirm('Supprimer ce vinyle ?')) return;
        saveUser(loadUser().filter(i=>i.id!==id));
        render();
        showToast('🗑️ Vinyle supprimé');
    }

    // === Scanner photo ===
    // ─── Scanner live ────────────────────────────────────────────────
    let _qr=null, _scanActive=false;
    function _isMobile(){ return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent); }
    function toggleLiveScanner(){ if(_scanActive) stopLiveScanner(); else startLiveScanner(); }
    async function startLiveScanner(){
        if(!navigator.mediaDevices){ showToast('⚠ Caméra non disponible',true); return; }
        document.getElementById('scannerZone').style.display='block';
        document.getElementById('scanMsg').textContent='Démarrage caméra...';
        document.getElementById('btnLiveScan').textContent='⏹';
        const onSuccess=(code)=>{ stopLiveScanner(); document.getElementById('apiQ').value=code; showToast('✅ Code : '+code); doApiSearch(); };
        const config={fps:10,qrbox:{width:250,height:100},aspectRatio:1.7};
        try{
            _qr=new Html5Qrcode('scanVideo');
            await _qr.start({facingMode:_isMobile()?'environment':'user'},config,onSuccess,()=>{});
            _scanActive=true;
            document.getElementById('scanMsg').textContent='Pointez vers le code-barres';
        }catch(e){
            try{
                _qr=new Html5Qrcode('scanVideo');
                await _qr.start({facingMode:'user'},config,onSuccess,()=>{});
                _scanActive=true;
                document.getElementById('scanMsg').textContent='Pointez vers le code-barres';
            }catch(e2){
                if(_qr){_qr.clear();_qr=null;}
                document.getElementById('scannerZone').style.display='none';
                document.getElementById('btnLiveScan').textContent='📷';
                showToast('❌ Accès caméra refusé',true);
            }
        }
    }
    function stopLiveScanner(){
        _scanActive=false;
        if(_qr){_qr.stop().then(()=>{_qr.clear();_qr=null;}).catch(()=>{try{_qr.clear();}catch(e){}_qr=null;});}
        document.getElementById('scannerZone').style.display='none';
        document.getElementById('btnLiveScan').textContent='📷';
    }

    // === API Discogs + MusicBrainz ===
    const MB_TTL=86400000;
    async function searchMB(q){
        const ckey='mb_v_'+q.slice(0,50).replace(/\W/g,'_');
        try{ const c=JSON.parse(localStorage.getItem(ckey)||'null'); if(c&&Date.now()-c.ts<MB_TTL) return c.data; }catch{}
        const isBC=/^\d{8,14}$/.test(q.trim());
        const url=isBC
            ?`https://musicbrainz.org/ws/2/release?query=barcode:${q}&limit=5&fmt=json`
            :`https://musicbrainz.org/ws/2/release?query=${encodeURIComponent(q)}+format:Vinyl&limit=6&fmt=json`;
        const r=await fetch(url,{headers:{'User-Agent':'Collectioner/2.0 ( personal )'}});
        if(!r.ok) throw new Error('MusicBrainz HTTP '+r.status);
        const data=await r.json();
        const results=(data.releases||[]).map(rel=>{
            const artist=(rel['artist-credit']||[]).map(a=>a.artist?.name||a.name||'').filter(Boolean).join(', ');
            return { id:rel.id, title:rel.title, artist, year:(rel.date||'').slice(0,4), genre:(rel.genres||[])[0]?.name||'', label:((rel['label-info']||[])[0]?.label?.name)||'', cover:`https://coverartarchive.org/release/${rel.id}/front-250`, source:'MusicBrainz' };
        });
        try{ localStorage.setItem(ckey,JSON.stringify({ts:Date.now(),data:results})); }catch{}
        return results;
    }

    let _dcLastQuery='', _dcCurrentPage=1, _dcTotalResults=0;
    async function searchDiscogs(q,page=1){
        const isBC=/^\d{8,14}$/.test(q.trim());
        const token=localStorage.getItem('discogsToken');
        const headers={'User-Agent':'Collectioner/2.0'};
        if(token) headers['Authorization']='Discogs token='+token;
        const params=new URLSearchParams({type:'release',format:'Vinyl',per_page:'25',page:String(page)});
        if(isBC) params.set('barcode',q); else params.set('q',q);
        const r=await fetch('https://api.discogs.com/database/search?'+params,{headers});
        if(!r.ok) throw new Error('Discogs HTTP '+r.status);
        const data=await r.json();
        _dcTotalResults=data.pagination?.items||0;
        _dcCurrentPage=page;
        _dcLastQuery=q;
        return (data.results||[]).map(res=>{
            const p=(res.title||'').split(' - ');
            return { id:'dc-'+res.id, title:p[1]||res.title, artist:p[0]||'', year:res.year||'', genre:(res.genre||[])[0]||'', label:(res.label||[])[0]||'', cover:res.cover_image||'', source:'Discogs' };
        });
    }

    async function loadMoreDiscogs(){
        const btn=document.getElementById('btnLoadMore');
        if(btn) btn.textContent='⏳ Chargement...';
        try{
            const more=await searchDiscogs(_dcLastQuery,_dcCurrentPage+1);
            window._apiResults=[...window._apiResults,...more];
            renderApiResults(window._apiResults);
            document.getElementById('apiSt').textContent='Discogs: '+window._apiResults.length+' / '+_dcTotalResults+' résultat(s)';
        }catch(e){ document.getElementById('apiSt').textContent='❌ '+e.message; }
    }

    async function doApiSearch(){
        const q=document.getElementById('apiQ').value.trim();
        if(!q) return;
        document.getElementById('apiSt').textContent='⏳ Recherche Discogs...';
        document.getElementById('apiRes').innerHTML='';
        const isBC=/^\d{8,14}$/.test(q);
        try{
            let dc=await searchDiscogs(q,1);
            if(isBC&&!dc.length){
                const variant=q.startsWith('0')?q.slice(1):'0'+q;
                dc=await searchDiscogs(variant,1);
            }
            if(dc.length){
                window._apiResults=dc;
                document.getElementById('apiSt').textContent='Discogs: '+dc.length+' / '+_dcTotalResults+' résultat(s)';
                renderApiResults(dc);
                return;
            }
            document.getElementById('apiSt').textContent='⏳ Discogs vide — MusicBrainz...';
            const mb=await searchMB(q);
            window._apiResults=mb;
            document.getElementById('apiSt').textContent=mb.length
                ?'MusicBrainz: '+mb.length+' résultat(s)'
                :'❌ Aucun résultat sur Discogs ni MusicBrainz.';
            renderApiResults(mb);
        }catch(e){ document.getElementById('apiSt').textContent='❌ '+e.message; }
    }

    function renderApiResults(results){
        const el=document.getElementById('apiRes');
        if(!results.length){ el.innerHTML='<div style="padding:8px;opacity:.4;font-size:.83rem;">Aucun résultat</div>'; return; }
        const frag=document.createDocumentFragment();
        results.forEach((r,i)=>{
            const row=document.createElement('div');
            row.className='res-item';
            row.title='Cliquer pour voir les pochettes';
            row.style.cursor='pointer';
            row.onclick=function(e){ if(e.target.closest('button')) return; openCoverLightbox(i,e); };
            const thumb=document.createElement('div');
            thumb.className='res-thumb';
            if(r.cover) thumb.style.backgroundImage='url('+r.cover+')';
            else thumb.textContent='🎵';
            const badge=document.createElement('div');
            badge.textContent='🔍';
            badge.style.cssText='position:absolute;bottom:1px;right:2px;font-size:.7rem;background:rgba(0,0,0,.7);border-radius:2px;padding:1px 3px;';
            thumb.appendChild(badge);
            const info=document.createElement('div');
            info.style.cssText='flex:1;min-width:0;';
            const title=document.createElement('div'); title.className='res-title'; title.textContent=r.title+(r.year?' ('+r.year+')':'');
            const sub=document.createElement('div'); sub.className='res-sub'; sub.textContent=(r.artist||'—')+(r.label?' • '+r.label:'');
            info.appendChild(title); info.appendChild(sub);
            const btn=document.createElement('button');
            btn.textContent='✓ Choisir';
            btn.style.cssText='background:#00ff88;color:#000;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-family:Rajdhani,sans-serif;font-weight:700;font-size:.8rem;flex-shrink:0;';
            btn.onclick=function(e){ e.stopPropagation(); applyResult(i); };
            row.appendChild(thumb); row.appendChild(info); row.appendChild(btn);
            frag.appendChild(row);
        });
        if(results.length<_dcTotalResults){
            const more=document.createElement('button');
            more.id='btnLoadMore';
            more.textContent='⬇ Charger plus ('+results.length+' / '+_dcTotalResults+')';
            more.style.cssText='width:100%;margin-top:6px;padding:8px;background:rgba(255,0,136,.1);color:#ff0088;border:2px solid rgba(255,0,136,.3);border-radius:6px;cursor:pointer;font-family:Rajdhani,sans-serif;font-weight:700;font-size:.85rem;';
            more.onclick=loadMoreDiscogs;
            frag.appendChild(more);
        }
        el.innerHTML=''; el.appendChild(frag);
    }

    function applyResult(i){
        const r=window._apiResults[i]; if(!r) return;
        document.getElementById('fTitle').value=r.title||'';
        document.getElementById('fArtist').value=r.artist||'';
        document.getElementById('fYear').value=r.year||'';
        document.getElementById('fGenre').value=r.genre||'';
        document.getElementById('fLabel').value=r.label||'';
        if(r.cover){ setPreviewUrl(r.cover); document.getElementById('fCoverFront').value=r.cover; }
        document.getElementById('apiRes').innerHTML='';
        document.getElementById('apiSt').textContent='✅ Informations importées — vérifiez et complétez !';
    }

    // === Lightbox ===
    async function fetchCovers(resultId){
        if(resultId&&resultId.startsWith('dc-')) return fetchDiscogsCovers(resultId.replace('dc-',''));
        try{
            const r=await fetch(`https://coverartarchive.org/release/${resultId}`,{headers:{'Accept':'application/json'}});
            if(!r.ok) return [];
            const data=await r.json();
            let backSeen=false,otherN=2;
            return (data.images||[]).map(img=>({
                url:img.thumbnails?.large||img.image, urlFull:img.image,
                label:img.front?'Avant':img.back?(()=>{ if(!backSeen){backSeen=true;return 'Arrière';}return 'Photo '+otherN++; })():'Photo '+otherN++
            }));
        }catch{ return []; }
    }

    async function fetchDiscogsCovers(dcId){
        try{
            const token=localStorage.getItem('discogsToken');
            const headers={'User-Agent':'Collectioner/2.0'};
            if(token) headers['Authorization']='Discogs token='+token;
            const r=await fetch('https://api.discogs.com/releases/'+dcId,{headers});
            if(!r.ok) return [];
            const data=await r.json();
            const images=data.images||[];
            if(!images.length) return [];
            const sorted=[...images].sort((a,b)=>a.type==='primary'?-1:b.type==='primary'?1:0);
            let backSeen=false,otherN=2;
            return sorted.map(img=>({
                url:img.uri||img.uri150, urlFull:img.uri,
                label:img.type==='primary'?'Avant':(()=>{ if(!backSeen){backSeen=true;return 'Arrière';}return 'Photo '+otherN++; })()
            }));
        }catch{ return []; }
    }

    let _lbCovers=[],_lbCurIdx=0,_lbResultIdx=0,_lbSlots={front:null,back:null},_lbMode='search';

    async function openCoverLightbox(resultIdx,e){
        e.stopPropagation();
        const r=window._apiResults[resultIdx]; if(!r) return;
        _lbResultIdx=resultIdx; _lbMode='search'; _lbSlots={front:null,back:null};
        document.getElementById('lbImg').src='';
        document.getElementById('lbTabs').innerHTML='<span style="color:#ff0088;font-size:.8rem;">⏳ Chargement...</span>';
        document.getElementById('lbActions').style.display='flex';
        // Infos album
        const infoEl=document.getElementById('lbInfo');
        document.getElementById('lbInfoTitle').textContent=(r.title||'')+(r.year?' ('+r.year+')':'');
        document.getElementById('lbInfoSub').textContent=[r.artist,r.label].filter(Boolean).join(' • ');
        infoEl.style.display='block';
        document.getElementById('coverLightbox').classList.add('active');
        const covers=await fetchCovers(r.id);
        _lbCovers=covers.length?covers:[{url:r.cover,urlFull:r.cover,label:'Avant'}];
        _lbCurIdx=0;
        renderLightbox();
    }

    function renderLightbox(){
        document.getElementById('lbTabs').innerHTML=_lbCovers.map((c,i)=>`<button class="lightbox-tab${i===_lbCurIdx?' active':''}" onclick="switchLbTab(${i})">${c.label}</button>`).join('');
        document.getElementById('lbImg').src=_lbCovers[_lbCurIdx]?.urlFull||_lbCovers[_lbCurIdx]?.url||'';
        document.querySelectorAll('.lightbox-slot').forEach(btn=>{
            const m=btn.getAttribute('onclick').match(/assignSlot\('(\w+)'\)/);
            if(m) btn.classList.toggle('assigned',_lbSlots[m[1]]===(_lbCovers[_lbCurIdx]?.urlFull||_lbCovers[_lbCurIdx]?.url||''));
        });
    }

    function switchLbTab(i){ _lbCurIdx=i; renderLightbox(); }

    function assignSlot(slot){
        const cover=_lbCovers[_lbCurIdx]; if(!cover) return;
        const url=cover.urlFull||cover.url||'';
        _lbSlots[slot]=(_lbSlots[slot]===url)?null:url;
        renderLightbox();
        showToast(_lbSlots[slot]?'✅ '+(slot==='front'?'Avant':'Arrière')+' défini':'❌ Retiré');
    }

    function applyLightboxCovers(){
        const r=_lbResultIdx>=0?window._apiResults[_lbResultIdx]:null;
        if(r){
            if(!document.getElementById('fTitle').value) document.getElementById('fTitle').value=r.title||'';
            if(!document.getElementById('fArtist').value) document.getElementById('fArtist').value=r.artist||'';
            if(!document.getElementById('fYear').value) document.getElementById('fYear').value=r.year||'';
            if(!document.getElementById('fGenre').value) document.getElementById('fGenre').value=r.genre||'';
            if(!document.getElementById('fLabel').value) document.getElementById('fLabel').value=r.label||'';
        }
        if(_lbSlots.front){ document.getElementById('fCoverFront').value=_lbSlots.front; setPreviewUrl(_lbSlots.front); }
        if(_lbSlots.back) document.getElementById('fCoverBack').value=_lbSlots.back;
        closeLightbox();
        showToast('🖼️ Pochettes enregistrées !');
    }

    function openItemCover(id){
        const item=getAll().find(v=>v.id===id); if(!item) return;
        _lbMode='view'; _lbResultIdx=-1; _lbCovers=[];
        if(item.coverFront) _lbCovers.push({url:item.coverFront,urlFull:item.coverFront,label:'Avant'});
        if(item.coverBack) _lbCovers.push({url:item.coverBack,urlFull:item.coverBack,label:'Arrière'});
        if(!_lbCovers.length&&item.cover) _lbCovers.push({url:item.cover,urlFull:item.cover,label:'Pochette'});
        if(!_lbCovers.length) return;
        _lbCurIdx=0;
        document.getElementById('lbActions').style.display='none';
        document.getElementById('coverLightbox').classList.add('active');
        renderLightbox();
    }

    function closeLightbox(){
        document.getElementById('coverLightbox').classList.remove('active');
        document.getElementById('lbImg').src='';
        document.getElementById('lbActions').style.display='';
        _lbCovers=[]; _lbResultIdx=-1; _lbSlots={front:null,back:null};
    }

    let toastTimer;
    function showToast(msg,err=false){
        const t=document.getElementById('toast');
        t.textContent=msg; t.className='toast show'+(err?' error':'');
        clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
    }

    document.addEventListener('DOMContentLoaded', ()=>{
        const apiQ=document.getElementById('apiQ');
        let eanTimer;
        apiQ.addEventListener('input', ()=>{
            clearTimeout(eanTimer);
            const val=apiQ.value.trim();
            if(/^\d{8,14}$/.test(val)) eanTimer=setTimeout(()=>doApiSearch(), 120);
        });
    });
    window.addEventListener('load',async()=>{ await loadFromGist(); render(); });
    </script>
